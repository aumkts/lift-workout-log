<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#09090d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>LIFT — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090d;--s1:#0f0f14;--s2:#161620;--s3:#1e1e2a;--s4:#252532;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.11);--bd3:rgba(255,255,255,.18);
  --a:#c8ff3c;--a2:#a3d400;--a3:rgba(200,255,60,.1);
  --t:#eeeef4;--ts:#7a7a96;--td:#3a3a52;
  --err:#ff4f5a;--err2:rgba(255,79,90,.1);
  --ok:#3de87a;--ok2:rgba(61,232,122,.1);
  --r:10px;--r2:14px;--nav:66px;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--t);font-family:'Barlow',-apple-system,sans-serif;font-size:16px;min-height:100svh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-webkit-overflow-scrolling:touch}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}
.hidden{display:none!important}
#app{max-width:480px;margin:0 auto;min-height:100svh;position:relative}
.view{min-height:100svh}

/* ── Auth ── */
#v-auth{display:flex;align-items:center;justify-content:center;min-height:100svh;padding:28px 22px}
.auth-inner{width:100%;max-width:360px;animation:slideUp .5s var(--ease)}
.auth-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:82px;line-height:.88;color:var(--a);letter-spacing:3px;display:block;filter:drop-shadow(0 0 24px rgba(200,255,60,.3))}
.auth-tagline{font-size:10px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--ts);margin-top:8px}
.auth-brand{margin-bottom:40px}
.auth-tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:4px;margin-bottom:24px;border:1px solid var(--bd);gap:4px}
.auth-tab{flex:1;padding:10px;text-align:center;background:none;border:none;color:var(--ts);font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s var(--ease)}
.auth-tab.active{background:var(--s3);color:var(--t);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* ── Form ── */
.field{margin-bottom:15px}
.field label{display:block;margin-bottom:6px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ts)}
.input{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);color:var(--t);font-size:16px;padding:12px 14px;transition:border-color .18s,background .18s,box-shadow .18s;-webkit-appearance:none;appearance:none;outline:none}
.input:focus{border-color:var(--a);background:var(--s3);box-shadow:0 0 0 3px rgba(200,255,60,.09)}
.input::placeholder{color:var(--td)}
select.input{cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Buttons ── */
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;text-align:center;background:var(--a);color:#000;border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .18s var(--ease);position:relative;overflow:hidden}
.btn:active{transform:scale(.97);opacity:.9}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--ts);border:1px solid var(--bd2);font-size:14px;font-family:'Barlow',sans-serif;font-weight:600;letter-spacing:0}
.btn-ghost:active{background:var(--s2)}
.btn-sm{display:inline-flex;align-items:center;justify-content:center;width:auto;padding:7px 14px;font-size:13px;border-radius:8px;white-space:nowrap;font-family:'Barlow',sans-serif;font-weight:600;letter-spacing:0}
.btn-danger{background:var(--err)!important;color:#fff!important}
.icon-btn{background:none;border:1px solid var(--bd);border-radius:7px;padding:5px 9px;color:var(--ts);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:4px}
.icon-btn:active{background:var(--s3);transform:scale(.95)}
.icon-btn.del{border-color:rgba(255,79,90,.25);color:var(--err)}
.icon-btn.del:active{background:var(--err2)}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;background:rgba(9,9,13,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:27px;color:var(--a);letter-spacing:3px}
.header-right{display:flex;align-items:center;gap:10px}
.header-user{font-size:13px;color:var(--ts);font-weight:500;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-out{background:none;border:1px solid var(--bd2);color:var(--ts);border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.header-out:active{background:var(--s2)}

/* ── Layout ── */
.tab-pane{flex:1;overflow-y:auto;padding:20px 18px calc(var(--nav) + 28px)}
.tab-pane.entering{animation:tabIn .25s var(--ease) both}

/* ── Nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav);display:flex;align-items:center;background:rgba(15,15,20,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--td);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:color .2s var(--ease);position:relative}
.nav-btn.active{color:var(--a)}
.nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--a);border-radius:0 0 2px 2px}
.nav-btn svg{width:20px;height:20px;flex-shrink:0;transition:transform .2s var(--spring)}
.nav-btn.active svg{transform:scale(1.1)}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;height:100%;background:none;border:none;cursor:pointer;padding:0}
.nav-circle{width:50px;height:50px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(200,255,60,.35);transition:transform .2s var(--spring),box-shadow .2s}
.nav-circle:active{transform:scale(.9)}
.nav-circle.active-tab{background:var(--a2);box-shadow:0 0 28px rgba(200,255,60,.5)}
.nav-circle svg{width:24px;height:24px;color:#000}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 14px;transition:transform .2s var(--spring),border-color .18s}
.stat-card:active{transform:scale(.98)}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:48px;line-height:1;color:var(--t);font-variant-numeric:tabular-nums}
.stat-num.accent{color:var(--a)}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ts);margin-top:5px}
.stat-wide{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.stat-wide-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ts);margin-bottom:6px}
.stat-wide-val{font-size:17px;font-weight:500}
.stat-big{display:flex;align-items:baseline;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:38px;line-height:1}
.stat-unit{font-size:13px;color:var(--ts);font-family:'Barlow',sans-serif;font-weight:400}

/* ── Section ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:20px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--ts)}

/* ── Workout items ── */
.wo-item{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--bd)}
.wo-item:last-child{border-bottom:none}
.wo-dot{width:7px;height:7px;border-radius:50%;background:var(--a);flex-shrink:0}
.wo-name{font-weight:500;font-size:15px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo-meta{font-size:12px;color:var(--ts)}
.wo-date{font-size:11px;color:var(--td);white-space:nowrap;flex-shrink:0}
.wo-del-btn{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:none;border:1px solid transparent;color:var(--td);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.wo-del-btn:active{background:var(--err2);color:var(--err);border-color:rgba(255,79,90,.2);transform:scale(.9)}

/* ── Ex entry ── */
.ex-entry{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:15px;margin-bottom:12px;position:relative;animation:slideUp .22s var(--ease)}
.ex-entry:focus-within{border-color:rgba(200,255,60,.18)}
.ex-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--a);margin-bottom:12px}
.ex-del{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--td);font-size:22px;line-height:1;cursor:pointer;padding:2px 6px;transition:color .15s,transform .15s}
.ex-del:active{color:var(--err);transform:scale(.85)}

/* ── Day group ── */
.day-group{margin-bottom:22px}
.day-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--ts);padding-bottom:10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.day-del-btn{background:none;border:none;color:var(--td);font-size:12px;font-weight:600;cursor:pointer;padding:3px 8px;border-radius:6px;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.day-del-btn:active{background:var(--err2);color:var(--err)}

/* ── Filter ── */
.filter-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:16px}

/* ── Chips ── */
.chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:100px;background:var(--s2);border:1px solid var(--bd);color:var(--ts);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.active{background:var(--a);border-color:var(--a);color:#000;box-shadow:0 2px 12px rgba(200,255,60,.22)}

/* ── Chart ── */
.chart-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:14px;overflow:hidden}
.chart-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ts);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.chart-label span{font-size:10px;color:var(--a);font-weight:600;letter-spacing:0;text-transform:none}

/* ── Progress ── */
.metric-tabs{display:flex;gap:0;background:var(--s3);border-radius:9px;padding:3px;margin-bottom:14px}
.metric-tab{flex:1;text-align:center;padding:8px 4px;border-radius:7px;font-size:12px;font-weight:600;color:var(--ts);cursor:pointer;background:none;border:none;transition:all .2s var(--ease)}
.metric-tab.active{background:var(--s2);color:var(--t);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.prog-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.prog-kpi{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:13px 10px;text-align:center;transition:border-color .18s}
.prog-kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;color:var(--a);display:block;margin-bottom:3px;line-height:1}
.prog-kpi-lbl{font-size:9px;color:var(--ts);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.no-data{text-align:center;padding:40px 0;font-size:13px;color:var(--ts);line-height:2.4}

/* ── Skeleton ── */
.skel{background:linear-gradient(90deg,var(--s2) 0%,var(--s3) 50%,var(--s2) 100%);background-size:200% 100%;border-radius:6px;animation:shimmer 1.6s ease-in-out infinite}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(var(--nav) + 14px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--s3);border:1px solid var(--bd2);color:var(--t);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .22s var(--ease),transform .22s var(--spring);max-width:calc(100vw - 40px);text-align:center;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--err);color:var(--err);background:rgba(255,79,90,.08)}
#toast.ok{border-color:var(--ok);color:var(--ok);background:rgba(61,232,122,.08)}

/* ── Loader ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s var(--ease)}
#loader.fade{opacity:0;pointer-events:none}
.loader-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:72px;color:var(--a);letter-spacing:3px;animation:logoPulse 1.2s ease-in-out infinite;display:block;filter:drop-shadow(0 0 28px rgba(200,255,60,.4))}
.loader-bar{width:80px;height:2px;background:var(--s3);border-radius:1px;margin:16px auto 0;overflow:hidden}
.loader-fill{height:100%;background:var(--a);border-radius:1px;animation:barLoad 1.2s ease-in-out infinite}
@keyframes logoPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes barLoad{0%{width:0%;margin-left:0}50%{width:80%;margin-left:0}100%{width:0%;margin-left:100%}}

/* ── Settings ── */
.settings-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:14px;overflow:hidden}
.settings-hd{padding:13px 15px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.settings-hd-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--ts)}
.profile-row{display:flex;align-items:center;gap:14px;padding:18px 16px}
.avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#000;box-shadow:0 0 16px rgba(200,255,60,.2)}
.profile-name{font-size:18px;font-weight:600;margin-bottom:2px}
.profile-meta{font-size:12px;color:var(--ts)}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600}
.badge.bp{background:var(--s3);color:var(--ts);border:1px solid var(--bd)}
.badge.custom{background:var(--a3);color:var(--a);border:1px solid rgba(200,255,60,.18)}
.ex-mgmt-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);transition:background .12s}
.ex-mgmt-item:last-child{border-bottom:none}
.ex-mgmt-name{flex:1;font-size:14px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.add-ex-form-wrap{background:var(--s3);border-top:1px solid var(--bd);padding:14px}
.bp-sel{background:var(--s3);border:1px solid var(--bd);color:var(--t);font-size:12px;border-radius:7px;padding:5px 10px;cursor:pointer;-webkit-appearance:none;appearance:none;max-width:110px;transition:border-color .15s}
.bp-sel:focus{outline:none;border-color:var(--a)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ts);pointer-events:none}
.sinput{padding-left:38px!important}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s var(--ease);padding:0 12px 12px}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--s2);border:1px solid var(--bd2);border-radius:20px;padding:22px 18px;width:100%;max-width:440px;transform:translateY(22px);transition:transform .28s var(--spring)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px}
.modal-body{font-size:13px;color:var(--ts);margin-bottom:20px;line-height:1.65}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{font-family:'Barlow',sans-serif;font-size:15px;font-weight:600;letter-spacing:0;padding:12px}

/* ── Animations ── */
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tabIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="loader">
  <div style="text-align:center">
    <span class="loader-logo">LIFT</span>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>
</div>
<div id="toast"></div>

<div id="confirm-modal" class="modal-overlay" onclick="closeConfirm(event)">
  <div class="modal-sheet">
    <div class="modal-title" id="confirm-title">ยืนยัน?</div>
    <div class="modal-body" id="confirm-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn btn-danger" id="confirm-ok">ลบ</button>
    </div>
  </div>
</div>

<div id="app">

<!-- ═══ AUTH ═══ -->
<div id="v-auth" class="view hidden">
  <div class="auth-inner">
    <div class="auth-brand">
      <span class="auth-logo">LIFT</span>
      <div class="auth-tagline">Workout Tracker</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="setAuthTab('login')">เข้าสู่ระบบ</button>
      <button class="auth-tab" id="tab-reg" onclick="setAuthTab('reg')">สมัครสมาชิก</button>
    </div>
    <form id="form-login" onsubmit="doLogin(event)">
      <div class="field"><label>ชื่อผู้ใช้</label><input id="l-user" class="input" type="text" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="username"></div>
      <div class="field" style="margin-bottom:24px"><label>รหัสผ่าน</label><input id="l-pass" class="input" type="password" autocomplete="current-password" placeholder="••••••"></div>
      <button id="btn-login" class="btn" type="submit">เข้าสู่ระบบ</button>
    </form>
    <form id="form-reg" class="hidden" onsubmit="doRegister(event)">
      <div class="field"><label>ชื่อที่แสดง</label><input id="r-name" class="input" type="text" autocapitalize="words" placeholder="ชื่อของคุณ"></div>
      <div class="field"><label>ชื่อผู้ใช้</label><input id="r-user" class="input" type="text" autocomplete="username" autocapitalize="off" spellcheck="false" placeholder="username (ภาษาอังกฤษ)"></div>
      <div class="field"><label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label><input id="r-pass" class="input" type="password" autocomplete="new-password" placeholder="••••••"></div>
      <div class="field" style="margin-bottom:24px"><label>ยืนยันรหัสผ่าน</label><input id="r-cfm" class="input" type="password" autocomplete="new-password" placeholder="••••••"></div>
      <button id="btn-reg" class="btn" type="submit">สมัครสมาชิก</button>
    </form>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="v-main" class="view hidden">
  <header class="header">
    <div class="header-logo">LIFT</div>
    <div class="header-right">
      <span class="header-user" id="u-name"></span>
      <button class="header-out" onclick="doLogout()">ออก</button>
    </div>
  </header>

  <!-- ── Dashboard ── -->

<script>
// ═══════════════════════════════════════════════════════
//  ⚙️ แก้ URL นี้ให้เป็น URL ของ Apps Script ที่ Deploy
// ═══════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxe8iwgIu0KQzMc6iPybcWMxSKFIomY27X2U7UgkiW1Ce1hwzmYTjR16GXrsoVTjbKbng/exec';
// ═══════════════════════════════════════════════════════

// ══ Default Exercise Library ══════════════════════════
const DEFAULT_EXERCISES = [

  {name:'Cable Lateral Raise',category:'ไหล่'},
  // แขน (Arms)
  {name:'Bicep Curl',category:'แขน'},{name:'Hammer Curl',category:'แขน'},
  {name:'Preacher Curl',category:'แขน'},{name:'Concentration Curl',category:'แขน'},
  {name:'Cable Bicep Curl',category:'แขน'},{name:'Incline Dumbbell Curl',category:'แขน'},
  {name:'Tricep Pushdown',category:'แขน'},{name:'Skull Crusher',category:'แขน'},
  {name:'Overhead Tricep Extension',category:'แขน'},{name:'Tricep Kickback',category:'แขน'},
  {name:'Diamond Push Up',category:'แขน'},{name:'Cable Tricep Overhead',category:'แขน'},
  // ขา (Legs)
  {name:'Squat',category:'ขา'},{name:'Front Squat',category:'ขา'},
  {name:'Leg Press',category:'ขา'},{name:'Leg Extension',category:'ขา'},
  {name:'Leg Curl',category:'ขา'},{name:'Lunges',category:'ขา'},
  {name:'Walking Lunges',category:'ขา'},{name:'Calf Raise',category:'ขา'},
  {name:'Bulgarian Split Squat',category:'ขา'},{name:'Hack Squat',category:'ขา'},
  {name:'Glute Bridge',category:'ขา'},{name:'Hip Thrust',category:'ขา'},
  {name:'Sumo Squat',category:'ขา'},{name:'Step Up',category:'ขา'},
  // Core
  {name:'Plank',category:'Core'},{name:'Side Plank',category:'Core'},
  {name:'Ab Crunch',category:'Core'},{name:'Leg Raise',category:'Core'},
  {name:'Hanging Leg Raise',category:'Core'},{name:'Russian Twist',category:'Core'},
  {name:'Cable Crunch',category:'Core'},{name:'Ab Rollout',category:'Core'},
  {name:'Mountain Climber',category:'Core'},{name:'Bicycle Crunch',category:'Core'},
  {name:'V-Up',category:'Core'},{name:'Dead Bug',category:'Core'},
  // Cardio
  {name:'Running',category:'Cardio'},{name:'Treadmill',category:'Cardio'},
  {name:'Cycling',category:'Cardio'},{name:'Jump Rope',category:'Cardio'},
  {name:'Rowing Machine',category:'Cardio'},{name:'Elliptical',category:'Cardio'},
  {name:'Stair Master',category:'Cardio'},{name:'Swimming',category:'Cardio'},
  {name:'HIIT',category:'Cardio'},{name:'Battle Rope',category:'Cardio'},
  // Full Body
  {name:'Burpee',category:'Full Body'},{name:'Kettlebell Swing',category:'Full Body'},
  {name:'Clean and Press',category:'Full Body'},{name:'Thruster',category:'Full Body'},
  {name:'Box Jump',category:'Full Body'},{name:'Turkish Get-Up',category:'Full Body'},
];

const BODY_PARTS = ['อก','หลัง','ไหล่','แขน','ขา','Core','Cardio','Full Body','อื่นๆ'];
const DAYS_TH    = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
const MONTHS_TH  = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ══ State ═════════════════════════════════════════════
const S = {
  token:  localStorage.getItem('lt'),
  user:   JSON.parse(localStorage.getItem('lu') || 'null'),
  exOpts: '',
  tab:    'dash',
  progFilters: { period: '7', bodyPart: '', exercise: '', metric: 'weight' },
  _progCache:  null,
  _histData:   [],
};

// ══ LocalStorage helpers ══════════════════════════════
const getBPMap     = ()  => JSON.parse(localStorage.getItem('lt_bp')  || '{}');
const saveBPMap    = m   => localStorage.setItem('lt_bp',  JSON.stringify(m));
const getCustomEx  = ()  => JSON.parse(localStorage.getItem('lt_cex') || '[]');
const saveCustomEx = a   => localStorage.setItem('lt_cex', JSON.stringify(a));
const getDeletedEx = ()  => JSON.parse(localStorage.getItem('lt_del') || '[]');
const saveDeletedEx= a   => localStorage.setItem('lt_del', JSON.stringify(a));

function getAllExercises() {
  const deleted    = new Set(getDeletedEx());
  const bpMap      = getBPMap();
  const custom     = getCustomEx();
  const customNames= new Set(custom.map(e => e.name));

  const base = DEFAULT_EXERCISES
    .filter(e => !deleted.has(e.name))
    .map(e => ({ name: e.name, category: bpMap[e.name] || e.category, isCustom: false }));

  const baseNames = new Set(base.map(e => e.name));
  const extras = custom
    .filter(e => !deleted.has(e.name) && !baseNames.has(e.name))
    .map(e => ({ name: e.name, category: bpMap[e.name] || e.category || 'อื่นๆ', isCustom: true }));

  return [...base, ...extras];
}

function getExBP(name) {
  const bpMap = getBPMap();
  if (bpMap[name]) return bpMap[name];
  const ex = [...DEFAULT_EXERCISES, ...getCustomEx()].find(e => e.name === name);
  return ex ? (ex.category || 'อื่นๆ') : 'อื่นๆ';
}

function getDistinctBPs() {
  const bps = new Set(getAllExercises().map(e => e.category || 'อื่นๆ'));
  return [...bps].filter(Boolean).sort();
}

function rebuildExOpts() {
  const all    = getAllExercises();
  const groups = all.reduce((g, e) => {
    (g[e.category] = g[e.category] || []).push(e);
    return g;
  }, {});
  S.exOpts = Object.entries(groups)
    .map(([cat, exs]) => `<optgroup label="${esc(cat)}">${exs.map(e => `<option value="${esc(e.name)}">${esc(e.name)}</option>`).join('')}</optgroup>`)
    .join('');
  document.querySelectorAll('.ex-select').forEach(populateSelect);
}

// ══ API ═══════════════════════════════════════════════
async function api(action, data = {}) {
  try {
    const body = { action, ...data };
    if (S.token) body.token = S.token;
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
    });
    const json = await r.json();
    if (json.code === 401) doLogout();
    return json;
  } catch {
    return { success: false, message: 'เชื่อมต่อไม่ได้ ลองใหม่อีกครั้ง' };
  }
}

// ══ Toast ═════════════════════════════════════════════
let _tt;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'err' ? ' err' : type === 'ok' ? ' ok' : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => (el.className = ''), 3000);
}

// ══ Confirm Modal ═════════════════════════════════════
function showConfirm(title, body, onOk, okLabel = 'ลบ') {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent  = body;
  const btn = document.getElementById('confirm-ok');
  btn.textContent = okLabel;
  btn.onclick = () => { closeConfirm(); onOk(); };
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirm(e) {
  if (e && e.target !== document.getElementById('confirm-modal')) return;
  document.getElementById('confirm-modal').classList.remove('show');
}

// ══ Init ══════════════════════════════════════════════
async function init() {
  if (SCRIPT_URL.includes('YOUR_DEPLOYMENT')) {
    document.getElementById('loader').innerHTML =
      '<div style="padding:30px;text-align:center;max-width:300px"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:52px;color:var(--a);margin-bottom:16px">LIFT</div><div style="color:var(--err);font-weight:600;margin-bottom:10px">⚠️ ยังไม่ได้ตั้งค่า</div><div style="color:var(--ts);font-size:14px;line-height:1.7">แก้ <code style="color:var(--t);background:var(--s2);padding:2px 6px;border-radius:4px">SCRIPT_URL</code></div></div>';
    return;
  }
  rebuildExOpts();
  if (S.token && S.user) await showMain();
  else { hideSplash(); showAuth(); }
}
function hideSplash() {
  const l = document.getElementById('loader');
  l.classList.add('fade');
  setTimeout(() => (l.style.display = 'none'), 400);
}

// ══ Auth ══════════════════════════════════════════════
function showAuth() {
  document.getElementById('v-auth').classList.remove('hidden');
  document.getElementById('v-main').classList.add('hidden');
}
function setAuthTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t === 'login');
  document.getElementById('tab-reg').classList.toggle('active', t === 'reg');
  document.getElementById('form-login').classList.toggle('hidden', t !== 'login');
  document.getElementById('form-reg').classList.toggle('hidden', t !== 'reg');
}
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!username || !password) return toast('กรอกข้อมูลให้ครบ', 'err');
  btn.disabled = true; btn.textContent = 'กำลังเข้า...';
  const r = await api('login', { username, password });
  btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
  if (r.success) {
    S.token = r.data.token;
    S.user  = { displayName: r.data.displayName, username };
    localStorage.setItem('lt', S.token);
    localStorage.setItem('lu', JSON.stringify(S.user));
    await showMain();
  } else toast(r.message || 'เข้าสู่ระบบไม่สำเร็จ', 'err');
}
async function doRegister(e) {
  e.preventDefault();
  const username    = document.getElementById('r-user').value.trim();
  const password    = document.getElementById('r-pass').value;
  const confirm     = document.getElementById('r-cfm').value;
  const displayName = document.getElementById('r-name').value.trim();
  if (!username || !password) return toast('กรอกข้อมูลให้ครบ', 'err');
  if (password !== confirm)   return toast('รหัสผ่านไม่ตรงกัน', 'err');
  const btn = document.getElementById('btn-reg');
  btn.disabled = true; btn.textContent = 'กำลังสมัคร...';
  const r = await api('register', { username, password, displayName });
  btn.disabled = false; btn.textContent = 'สมัครสมาชิก';
  if (r.success) { toast('สมัครสำเร็จ เข้าสู่ระบบได้เลย', 'ok'); setAuthTab('login'); document.getElementById('l-user').value = username; }
  else toast(r.message || 'สมัครไม่สำเร็จ', 'err');
}
function doLogout() {
  S.token = null; S.user = null; S.exOpts = '';
  localStorage.removeItem('lt'); localStorage.removeItem('lu');
  showAuth();
}

const ALL_TABS = ['dash','prog','log','hist','settings'];
function setTab(tab) {
  S.tab = tab;
  ALL_TABS.forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (t === tab) {
      el.classList.remove('hidden');
      el.classList.add('entering');

    }
  });
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));

  if (tab === 'log')      initLog();
  if (tab === 'hist')     { populateHistFilters(); loadHist(); }
  if (tab === 'settings') loadSettings();
}

// ─── Dashboard Line Chart (30 days) ───────────────────
function renderDashLineChart(workouts) {
  const today = new Date();
  const days  = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push({ date: d.toISOString().slice(0, 10), d, count: 0 });
  }
  workouts.forEach(w => {
    const found = days.find(x => x.date === w.date);
    if (found) found.count++;
  });

  const todayStr = today.toISOString().slice(0, 10);
  const totalDays = days.filter(d => d.count > 0).length;
  document.getElementById('dash-chart-meta').textContent =
    `${totalDays} วันที่ออกกำลังกาย`;

  const maxV = Math.max(...days.map(d => d.count), 1);
  const W = 360, H = 110, PL = 6, PR = 6, PT = 14, PB = 28;
  const cW = W - PL - PR, cH = H - PT - PB;
  const n  = days.length;
  const xs = i => PL + (i / (n - 1)) * cW;
  const ys = v => PT + cH - (v / maxV) * cH;

  const pts     = days.map((d, i) => `${xs(i).toFixed(1)},${ys(d.count).toFixed(1)}`).join(' ');
  const areaPts = `${xs(0).toFixed(1)},${(PT + cH).toFixed(1)} ${pts} ${xs(n-1).toFixed(1)},${(PT + cH).toFixed(1)}`;

  // x-axis labels every 7 days
  const xLabels = days.map((d, i) => {
    if (i !== 0 && i !== 14 && i !== n - 1) return '';
    const isToday = d.date === todayStr;
    const lbl = isToday ? 'วันนี้' : `${d.d.getDate()}/${d.d.getMonth() + 1}`;
    return `<text x="${xs(i).toFixed(1)}" y="${H - 5}" text-anchor="${i === 0 ? 'start' : i === n-1 ? 'end' : 'middle'}" fill="${isToday ? '#c8ff3c' : '#7a7a96'}" font-size="10" font-weight="${isToday ? '700' : '400'}" font-family="Barlow,sans-serif">${lbl}</text>`;
  }).join('');

  // Dots only on workout days
  const dots = days.map((d, i) => {
    if (!d.count) return '';
    const isToday = d.date === todayStr;
    return `<circle cx="${xs(i).toFixed(1)}" cy="${ys(d.count).toFixed(1)}" r="${isToday ? 5.5 : 4}" fill="${isToday ? '#c8ff3c' : 'rgba(200,255,60,.85)'}" stroke="#09090d" stroke-width="2"/>
      ${isToday ? `<circle cx="${xs(i).toFixed(1)}" cy="${ys(d.count).toFixed(1)}" r="9" fill="none" stroke="rgba(200,255,60,.22)" stroke-width="1"/>` : ''}`;
  }).join('');

  // Subtle horizontal grid
  const yLines = [0, .5, 1].map(t => {
    const y = ys(maxV * t).toFixed(1);
    return `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`;
  }).join('');

  document.getElementById('dash-line-chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
      <defs>
        <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c8ff3c" stop-opacity="0.16"/>
          <stop offset="100%" stop-color="#c8ff3c" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yLines}
      <polygon points="${areaPts}" fill="url(#dg)"/>
      <polyline points="${pts}" fill="none" stroke="#c8ff3c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xLabels}
    </svg>`;
}

function getPeriodDates() {
  const p = S.progFilters.period;
  if (p === 'all') return { from: '', to: '' };
  const to = new Date(), from = new Date();
  from.setDate(to.getDate() - parseInt(p));
  return { from: from.toISOString().slice(0, 10), to: to.toISOString().slice(0, 10) };
}

async function renderProgContent() {
  // Skeleton
  document.getElementById('prog-kpi').innerHTML = [0,1,2].map(() =>
    `<div class="prog-kpi"><div class="skel" style="height:26px;width:52px;margin:0 auto 6px;border-radius:6px"></div><div class="skel" style="height:9px;width:40px;margin:0 auto;border-radius:4px"></div></div>`).join('');
  document.getElementById('prog-chart').innerHTML =
    `<div style="display:flex;align-items:flex-end;gap:3px;height:130px;padding:0 4px">${Array(12).fill('<div class="skel" style="flex:1;border-radius:4px 4px 0 0"></div>').join('')}</div>`;

  const { from, to } = getPeriodDates();
  const apiFilters   = { from, to };
  if (S.progFilters.exercise) apiFilters.exercise = S.progFilters.exercise;

  document.getElementById('prog-chart-range').textContent = from
    ? `${from.slice(5).replace('-','/')} – ${to.slice(5).replace('-','/')}` : 'ทั้งหมด';

  let workouts;
  const cacheKey = S.progFilters.period + '|' + (S.progFilters.exercise || '');
  if (S._progCache?.key === cacheKey) {
    workouts = S._progCache.data;
  } else {
    const r = await api('getWorkouts', { filters: apiFilters });
    if (!r.success) {
      document.getElementById('prog-chart').innerHTML = `<div class="no-data">${esc(r.message)}</div>`;
      document.getElementById('prog-kpi').innerHTML = '';
      return;
    }
    workouts = r.data || [];
    S._progCache = { key: cacheKey, data: workouts };
  }

  const { bodyPart: bp, exercise: exName, metric } = S.progFilters;

  // Filter by body part client-side
  let filtered = workouts;
  if (bp && !exName) filtered = workouts.filter(w => getExBP(w.exerciseName) === bp);

  if (exName) {
    // ── Line chart: single exercise ──
    const lineData = buildLineData(filtered, metric);
    renderKPIs(calcKPIs(filtered, metric), metric);
    document.getElementById('prog-chart-label').textContent = `${exName} — ${metricLabel(metric)}`;
    document.getElementById('top-ex-card').style.display = 'none';
    document.getElementById('prog-chart').innerHTML = lineData.length
      ? svgLineChart(lineData, metric)
      : `<div class="no-data">ยังไม่มีข้อมูลในช่วงนี้ 📭</div>`;
  } else if (metric === 'sessions') {
    // ── Bar: sessions per exercise ──
    const grp = {};
    filtered.forEach(w => { grp[w.exerciseName] = (grp[w.exerciseName] || 0) + 1; });
    const bar = Object.entries(grp).sort((a,b) => b[1]-a[1]).slice(0,10).map(([label,value]) => ({label,value}));
    renderKPIsOverview(filtered);
    document.getElementById('prog-chart-label').textContent = bp ? `${bp} — Sessions` : 'Sessions ต่อท่า';
    document.getElementById('top-ex-card').style.display = 'none';
    document.getElementById('prog-chart').innerHTML = bar.length ? svgBarChart(bar) : `<div class="no-data">ยังไม่มีข้อมูล 📭</div>`;
  } else if (bp) {
    // ── Bar: top exercises in BP ──
    const grp = {};
    filtered.forEach(w => { grp[w.exerciseName] = (grp[w.exerciseName] || 0) + calcMetricVal(w, metric); });
    const bar = Object.entries(grp).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([label,value]) => ({label, value: Math.round(value*10)/10}));
    renderKPIsOverview(filtered);
    document.getElementById('prog-chart-label').textContent = `${bp} — ${metricLabel(metric)}`;
    document.getElementById('top-ex-card').style.display = 'none';
    document.getElementById('prog-chart').innerHTML = bar.length ? svgBarChart(bar) : `<div class="no-data">ยังไม่มีข้อมูล 📭</div>`;
  } else {
    // ── Overview ──
    const grp = {};
    filtered.forEach(w => { const b = getExBP(w.exerciseName); grp[b] = (grp[b]||0)+1; });
    const bar = Object.entries(grp).sort((a,b)=>b[1]-a[1]).map(([label,value]) => ({label,value}));
    renderKPIsOverview(filtered);
    document.getElementById('prog-chart-label').textContent = 'Sessions ต่อ Body Part';
    document.getElementById('prog-chart').innerHTML = bar.length
      ? svgBarChart(bar)
      : `<div class="no-data">ยังไม่มีข้อมูล<br>บันทึก Workout เพื่อดูสถิติ 🏋️</div>`;
    renderTopExercises(filtered);
  }
}

function calcMetricVal(w, metric) {
  if (metric === 'weight')  return Number(w.weight) || 0;
  if (metric === 'volume')  return (Number(w.sets)||0)*(Number(w.reps)||0)*(Number(w.weight)||0);
  if (metric === 'reps')    return Number(w.reps) || 0;
  return 1;
}
function buildLineData(workouts, metric) {
  const grouped = {};
  workouts.forEach(w => {
    if (!grouped[w.date]) grouped[w.date] = [];
    grouped[w.date].push(w);
  });
  return Object.entries(grouped).sort(([a],[b]) => a.localeCompare(b)).map(([date, ws]) => {
    let v = 0;
    if (metric === 'weight') v = Math.max(...ws.map(w => Number(w.weight)||0));
    if (metric === 'volume') v = ws.reduce((s,w) => s+(Number(w.sets)||0)*(Number(w.reps)||0)*(Number(w.weight)||0), 0);
    if (metric === 'reps')   v = Math.max(...ws.map(w => Number(w.reps)||0));
    if (metric === 'sessions') v = ws.length;
    return { date, v };
  }).filter(d => d.v > 0);
}
function calcKPIs(workouts, metric) {
  if (!workouts.length) return { pr: 0, sessions: 0, avg: 0 };
  const sessions = [...new Set(workouts.map(w => w.date))].length;
  let pr = 0, total = 0, cnt = 0;
  workouts.forEach(w => {
    const v = calcMetricVal(w, metric);
    if (v > pr) pr = v;
    total += v; cnt++;
  });
  return { pr, sessions, avg: cnt ? total/cnt : 0 };
}
function renderKPIs({ pr, sessions, avg }, metric) {
  const unit = metric === 'weight' ? ' kg' : '';
  document.getElementById('prog-kpi').innerHTML = `
    <div class="prog-kpi"><span class="prog-kpi-val">${fmt(pr)}${unit}</span><div class="prog-kpi-lbl">PR</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${sessions}</span><div class="prog-kpi-lbl">Sessions</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${fmt(avg)}${unit}</span><div class="prog-kpi-lbl">เฉลี่ย</div></div>`;
}
function renderKPIsOverview(workouts) {
  const sessions = [...new Set(workouts.map(w => w.date))].length;
  const exCount  = [...new Set(workouts.map(w => w.exerciseName))].length;
  const vol      = workouts.reduce((s,w) => s+(Number(w.sets)||0)*(Number(w.reps)||0)*(Number(w.weight)||0), 0);
  document.getElementById('prog-kpi').innerHTML = `
    <div class="prog-kpi"><span class="prog-kpi-val">${sessions}</span><div class="prog-kpi-lbl">Sessions</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${exCount}</span><div class="prog-kpi-lbl">ท่า</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${vol>=1000?(vol/1000).toFixed(1)+'k':Math.round(vol)}</span><div class="prog-kpi-lbl">Volume</div></div>`;
}
function renderTopExercises(workouts) {
  const grp = {};
  workouts.forEach(w => { grp[w.exerciseName] = (grp[w.exerciseName]||0)+1; });
  const top = Object.entries(grp).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const card = document.getElementById('top-ex-card');
  if (!top.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  const max = top[0][1];
  document.getElementById('top-ex-list').innerHTML = top.map(([name, count], i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:${i<top.length-1?'1px solid var(--bd)':'none'}">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--td);width:18px;flex-shrink:0">${i+1}</span>
      <span style="flex:1;font-size:14px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span>
      <div style="width:80px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0">
        <div style="height:100%;width:${(count/max*100).toFixed(0)}%;background:var(--a);border-radius:2px"></div>
      </div>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--a);width:28px;text-align:right;flex-shrink:0">${count}</span>
    </div>`).join('');
}
const fmt          = n => Number.isFinite(n) ? Math.round(n * 10)/10 : 0;
const metricLabel  = m => ({weight:'น้ำหนัก (kg)',volume:'Volume',reps:'Reps',sessions:'Sessions'}[m]||m);

// ══ SVG Charts ════════════════════════════════════════
function svgLineChart(data, metric) {
  const W=360,H=180,PL=46,PR=14,PT=14,PB=36;
  const cW=W-PL-PR, cH=H-PT-PB;
  const vals=data.map(d=>d.v), minV=Math.min(...vals), maxV=Math.max(...vals);
  const vR = maxV-minV||1;
  const xs = i => PL+(i/Math.max(data.length-1,1))*cW;
  const ys = v => PT+cH-((v-minV)/vR)*cH;

  const yLines=[0,.33,.67,1].map(t=>{
    const v=minV+vR*t, y=ys(v).toFixed(1);
    const lbl=metric==='volume'&&v>=1000?(v/1000).toFixed(1)+'k':Math.round(v);
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
      <text x="${PL-5}" y="${(parseFloat(y)+4).toFixed(1)}" text-anchor="end" fill="#7a7a96" font-size="10" font-family="Barlow,sans-serif">${lbl}</text>`;
  }).join('');

  const step=Math.max(1,Math.ceil(data.length/5));
  const idxs=[...new Set([0,...data.map((_,i)=>i).filter(i=>i%step===0),data.length-1])];
  const xLabels=idxs.map(i=>{
    const dt=new Date(data[i].date+'T00:00:00');
    return `<text x="${xs(i).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#7a7a96" font-size="10" font-family="Barlow,sans-serif">${dt.getDate()} ${MONTHS_TH[dt.getMonth()]}</text>`;
  }).join('');

  const pts=data.map((d,i)=>`${xs(i).toFixed(1)},${ys(d.v).toFixed(1)}`).join(' ');
  const areaPts=`${PL},${(PT+cH).toFixed(1)} ${pts} ${(W-PR).toFixed(1)},${(PT+cH).toFixed(1)}`;
  const dotR=data.length<=12?4.5:data.length<=25?3:2;
  const dots=data.map((d,i)=>`<circle cx="${xs(i).toFixed(1)}" cy="${ys(d.v).toFixed(1)}" r="${dotR}" fill="#c8ff3c" stroke="#09090d" stroke-width="2"/>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8ff3c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8ff3c" stop-opacity="0"/>
    </linearGradient></defs>
    ${yLines}
    <polygon points="${areaPts}" fill="url(#ag)"/>
    <polyline points="${pts}" fill="none" stroke="#c8ff3c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${xLabels}
  </svg>`;
}

function svgBarChart(data) {
  if (!data.length) return '<div class="no-data">ไม่มีข้อมูล</div>';
  const maxV=Math.max(...data.map(d=>d.value));
  const rowH=32,gap=7,W=360,PL=74,PR=46;
  const bW=W-PL-PR, H=data.length*(rowH+gap)+gap;
  const bars=data.map((d,i)=>{
    const y=gap+i*(rowH+gap);
    const bw=Math.max((d.value/maxV)*bW,4);
    const lbl=d.label.length>9?d.label.slice(0,9)+'…':d.label;
    return `<text x="${PL-8}" y="${(y+rowH*.66).toFixed(1)}" text-anchor="end" fill="#eeeef4" font-size="12" font-weight="500" font-family="Barlow,sans-serif">${esc(lbl)}</text>
      <rect x="${PL}" y="${y+7}" width="${bw.toFixed(1)}" height="${rowH-14}" rx="5" fill="rgba(200,255,60,.75)"/>
      <text x="${(PL+bw+7).toFixed(1)}" y="${(y+rowH*.66).toFixed(1)}" fill="#7a7a96" font-size="12" font-weight="600" font-family="Barlow Condensed,sans-serif">${d.value}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${bars}</svg>`;
}

// ══════════════════════════════════════════════════════
//  LOG WORKOUT
// ══════════════════════════════════════════════════════
function initLog() {
  document.getElementById('log-date').value = todayStr();
  document.getElementById('log-items').innerHTML = '';
  appendEntry();
}
function appendEntry() {
  const container = document.getElementById('log-items');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'ex-entry';
  div.innerHTML = entryHTML(idx+1, idx>0);
  container.appendChild(div);
  populateSelect(div.querySelector('.ex-select'));
  if (idx > 0) div.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function addEntry() { appendEntry(); }
function delEntry(btn) {
  btn.closest('.ex-entry').remove();
  document.querySelectorAll('.ex-num').forEach((el,i) => (el.textContent = 'EXERCISE '+(i+1)));
}
function entryHTML(num, canDel) {
  return `
    <div class="ex-num">EXERCISE ${num}</div>
    ${canDel?`<button type="button" class="ex-del" onclick="delEntry(this)">×</button>`:''}
    <div class="field">
      <label>ท่าออกกำลังกาย</label>
      <select class="input ex-select" onchange="onExSel(this)"><option value="">— เลือกท่า —</option></select>
      <input type="text" class="input custom-ex" style="display:none;margin-top:8px" placeholder="พิมพ์ชื่อท่า...">
    </div>
    <div class="row2">
      <div class="field"><label>Sets</label><input class="input" type="number" name="sets" min="1" value="3" inputmode="numeric"></div>
      <div class="field"><label>Reps</label><input class="input" type="number" name="reps" min="1" value="10" inputmode="numeric"></div>
    </div>
    <div class="row2">
      <div class="field"><label>น้ำหนัก (kg)</label><input class="input" type="number" name="weight" min="0" step="0.5" inputmode="decimal" placeholder="0"></div>
      <div class="field"><label>เวลา (นาที)</label><input class="input" type="number" name="duration" min="0" inputmode="numeric" placeholder="—"></div>
    </div>
    <div class="field" style="margin-bottom:0"><label>หมายเหตุ</label><input class="input" type="text" name="notes" placeholder="—"></div>`;
}
function onExSel(sel) {
  const cust = sel.closest('.ex-entry').querySelector('.custom-ex');
  const isCust = sel.value === '__custom';
  cust.style.display = isCust ? 'block' : 'none';
  if (isCust) cust.focus();
}
function populateSelect(sel) {
  if (!sel) return;
  const v = sel.value;
  sel.innerHTML = `<option value="">— เลือกท่า —</option>${S.exOpts}<option value="__custom">อื่นๆ (พิมพ์เอง)</option>`;
  if (v) sel.value = v;
}
async function saveWorkout() {
  const date = document.getElementById('log-date').value;
  if (!date) return toast('กรุณาเลือกวันที่','err');
  const entries = [...document.querySelectorAll('.ex-entry')];
  const workouts = [];
  for (let i=0;i<entries.length;i++) {
    const entry  = entries[i];
    const sel    = entry.querySelector('.ex-select');
    const cust   = entry.querySelector('.custom-ex');
    const exName = sel.value==='__custom' ? cust.value.trim() : sel.value;
    if (!exName) return toast(`กรุณาเลือกท่าข้อ ${i+1}`,'err');
    workouts.push({
      date, exerciseName: exName,
      sets:     entry.querySelector('[name=sets]').value     || 0,
      reps:     entry.querySelector('[name=reps]').value     || 0,
      weight:   entry.querySelector('[name=weight]').value   || 0,
      duration: entry.querySelector('[name=duration]').value || 0,
      notes:    entry.querySelector('[name=notes]').value    || '',
    });
  }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  const r = await api('addWorkouts', { workouts });
  btn.disabled = false; btn.textContent = 'บันทึก Workout 💪';
  if (r.success) { S._progCache = null; toast('บันทึกสำเร็จ 💪','ok'); initLog(); }
  else toast(r.message||'บันทึกไม่สำเร็จ','err');
}

// ══════════════════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════════════════
function populateHistFilters() {
  const bpSel = document.getElementById('f-bp');
  const curBP = bpSel.value;
  bpSel.innerHTML = `<option value="">ทั้งหมด</option>` +
    getDistinctBPs().map(b => `<option value="${esc(b)}" ${b===curBP?'selected':''}>${esc(b)}</option>`).join('');
  updateHistExSelect(curBP);
}
function onHistBPChange() { updateHistExSelect(document.getElementById('f-bp').value); applyHistFilter(); }
function updateHistExSelect(bp) {
  const sel = document.getElementById('f-ex');
  const cur = sel.value;
  const filtered = bp ? getAllExercises().filter(e => e.category===bp) : getAllExercises();
  sel.innerHTML = `<option value="">ทั้งหมด</option>` +
    filtered.map(e => `<option value="${esc(e.name)}" ${e.name===cur?'selected':''}>${esc(e.name)}</option>`).join('');
}
async function loadHist() {
  document.getElementById('hist-list').innerHTML = skelRecent(6);
  const bp = document.getElementById('f-bp')?.value || '';
  const apiFilters = {
    from:     document.getElementById('f-from').value,
    to:       document.getElementById('f-to').value,
    exercise: bp ? '' : (document.getElementById('f-ex').value||''),
  };
  const r = await api('getWorkouts', { filters: apiFilters });
  if (r.success) {
    let data = r.data;
    if (bp) data = data.filter(w => getExBP(w.exerciseName) === bp);
    const ex2 = document.getElementById('f-ex').value;
    if (bp && ex2) data = data.filter(w => w.exerciseName === ex2);
    S._histData = data;
    renderHist(data);
  } else {
    document.getElementById('hist-list').innerHTML =
      `<p style="color:var(--ts);text-align:center;padding:32px 0;font-size:14px">${esc(r.message)}</p>`;
  }
}
function applyHistFilter() { loadHist(); }

function renderHist(list) {
  const el = document.getElementById('hist-list');
  if (!list.length) { el.innerHTML = '<p style="color:var(--ts);text-align:center;padding:40px 0;font-size:14px;line-height:2.4">ไม่มีข้อมูลในช่วงนี้</p>'; return; }
  const groups = {};
  list.forEach((w, idx) => { if (!groups[w.date]) groups[w.date]=[]; groups[w.date].push({...w, _idx:idx}); });
  el.innerHTML = Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).map(([date, items]) => `
    <div class="day-group">
      <div class="day-lbl">
        <span>${formatDate(date)}</span>
        <button class="day-del-btn" onclick="confirmDeleteDay('${esc(date)}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
          ลบทั้งวัน
        </button>
      </div>
      ${items.map(w => `
        <div class="wo-item">
          <div class="wo-dot"></div>
          <div style="flex:1;min-width:0">
            <div class="wo-name">${esc(w.exerciseName)}</div>
            <div class="wo-meta">${metaStr(w)}</div>
          </div>
          <span class="badge bp" style="flex-shrink:0;margin-right:6px">${esc(getExBP(w.exerciseName))}</span>
          <button class="wo-del-btn" onclick="confirmDeleteWorkout(${w._idx})" title="ลบ">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
          </button>
        </div>`).join('')}
    </div>`).join('');
}

function confirmDeleteWorkout(idx) {
  const w = S._histData[idx];
  if (!w) return;
  showConfirm(
    'ลบการออกกำลังกาย?',
    `"${w.exerciseName}" วันที่ ${formatDate(w.date)} จะถูกลบถาวร`,
    () => deleteWorkout(w, idx)
  );
}
async function deleteWorkout(w, idx) {
  const r = await api('deleteWorkout', { workoutId: w.workoutId });
  if (r.success) {
    S._histData.splice(idx, 1);
    S._progCache = null;
    toast('ลบเรียบร้อย','ok');
    renderHist(S._histData);
  } else toast(r.message||'ลบไม่สำเร็จ','err');
}
function confirmDeleteDay(date) {
  const items = S._histData.filter(w => w.date === date);
  showConfirm(
    'ลบทั้งวัน?',
    `ลบ ${items.length} รายการของวันที่ ${formatDate(date)} ทั้งหมด`,
    () => deleteDay(date)
  );
}
async function deleteDay(date) {
  const r = await api('deleteWorkoutsByDate', { date });
  if (r.success) {
    S._histData = S._histData.filter(w => w.date !== date);
    S._progCache = null;
    toast(`ลบวันที่ ${formatDate(date)} แล้ว`,'ok');
    renderHist(S._histData);
  } else toast(r.message||'ลบไม่สำเร็จ','err');
}

// ══════════════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════════════
function loadSettings() {
  const user = S.user || {};
  const name = user.displayName || '—';
  document.getElementById('profile-avatar').textContent      = name.charAt(0).toUpperCase()||'?';
  document.getElementById('profile-name-display').textContent = name;
  document.getElementById('profile-username-display').textContent = user.username?`@${user.username}`:'';
  document.getElementById('edit-display-name').value = user.displayName||'';
  renderExList('');
  populateAddExBPSelect();
}
function populateAddExBPSelect() {
  document.getElementById('new-ex-bp').innerHTML =
    `<option value="">— เลือก —</option>` + BODY_PARTS.map(b => `<option value="${b}">${b}</option>`).join('');
}
function toggleEditProfile() {
  const form = document.getElementById('profile-edit-form');
  const btn  = document.getElementById('btn-edit-profile');
  form.classList.toggle('hidden');
  btn.textContent = form.classList.contains('hidden') ? 'แก้ไข' : 'ยกเลิก';
  if (!form.classList.contains('hidden')) document.getElementById('edit-display-name').focus();
}
async function saveProfile() {
  const newName = document.getElementById('edit-display-name').value.trim();
  const newPass = document.getElementById('edit-password').value;
  if (!newName) return toast('กรุณากรอกชื่อ','err');
  S.user = { ...S.user, displayName: newName };
  localStorage.setItem('lu', JSON.stringify(S.user));
  document.getElementById('u-name').textContent              = newName;
  document.getElementById('profile-name-display').textContent = newName;
  document.getElementById('profile-avatar').textContent      = newName.charAt(0).toUpperCase();
  const payload = { displayName: newName };
  if (newPass) payload.password = newPass;
  await api('updateProfile', payload);
  toast('บันทึกโปรไฟล์สำเร็จ','ok');
  document.getElementById('edit-password').value = '';
  toggleEditProfile();
}
function toggleAddExForm() {
  const form = document.getElementById('add-ex-form');
  form.classList.toggle('hidden');
  if (!form.classList.contains('hidden')) document.getElementById('new-ex-name').focus();
}
function addExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  const bp   = document.getElementById('new-ex-bp').value;
  if (!name) return toast('กรุณากรอกชื่อท่า','err');
  if (!bp)   return toast('กรุณาเลือก Body Part','err');
  const deleted = new Set(getDeletedEx());
  if (!deleted.has(name) && getAllExercises().find(e => e.name.toLowerCase()===name.toLowerCase()))
    return toast('ท่านี้มีอยู่แล้ว','err');
  // Remove from deleted if previously deleted
  if (deleted.has(name)) {
    saveDeletedEx(getDeletedEx().filter(n => n !== name));
    const bpMap = getBPMap(); bpMap[name]=bp; saveBPMap(bpMap);
  } else {
    const custom = getCustomEx();
    custom.push({ name, category: bp });
    saveCustomEx(custom);
    const bpMap = getBPMap(); bpMap[name]=bp; saveBPMap(bpMap);
  }
  rebuildExOpts();
  document.getElementById('new-ex-name').value = '';
  document.getElementById('new-ex-bp').value   = '';
  toggleAddExForm();
  renderExList('');
  toast(`เพิ่ม "${name}" สำเร็จ ✓`,'ok');
}

// ─── Delete any exercise ───────────────────────────
function confirmDeleteEx(name) {
  showConfirm(
    'ลบท่าออกกำลังกาย?',
    `"${name}" จะถูกลบออกจากรายการ (ประวัติที่บันทึกไว้จะยังคงอยู่)`,
    () => deleteEx(name)
  );
}
function deleteEx(name) {
  // Add to deleted set
  const deleted = getDeletedEx();
  if (!deleted.includes(name)) { deleted.push(name); saveDeletedEx(deleted); }
  // Remove from custom if present
  saveCustomEx(getCustomEx().filter(e => e.name !== name));
  // Clear BP override
  const bpMap = getBPMap(); delete bpMap[name]; saveBPMap(bpMap);
  rebuildExOpts();
  renderExList('');
  toast('ลบเรียบร้อย','ok');
}
function confirmRestoreDefaults() {
  showConfirm(
    'รีเซ็ต Library?',
    'คืนค่าท่าออกกำลังกายทั้งหมดที่ถูกลบ (Custom ที่เพิ่มเองจะยังคงอยู่)',
    () => { saveDeletedEx([]); rebuildExOpts(); renderExList(''); toast('คืนค่า Library สำเร็จ','ok'); },
    'รีเซ็ต'
  );
}
function updateExBP(name, bp) {
  const bpMap = getBPMap(); bpMap[name]=bp; saveBPMap(bpMap);
  const custom = getCustomEx();
  const ci = custom.findIndex(e => e.name === name);
  if (ci >= 0) { custom[ci].category=bp; saveCustomEx(custom); }
  rebuildExOpts();
  toast(`อัปเดต "${name}" → ${bp}`,'ok');
}

let _exSearchT;
function renderExList(query) {
  clearTimeout(_exSearchT);
  _exSearchT = setTimeout(() => _renderExList(query), 80);
}
function _renderExList(query) {
  const q   = (query||'').toLowerCase();
  const all = getAllExercises();
  const filtered = q ? all.filter(e => e.name.toLowerCase().includes(q)) : all;
  if (!filtered.length) {
    document.getElementById('ex-list').innerHTML =
      `<div style="padding:20px;text-align:center;color:var(--ts);font-size:13px">ไม่พบท่า "${query}"</div>`;
    return;
  }
  const bpMap = getBPMap();
  document.getElementById('ex-list').innerHTML = filtered.map(e => {
    const curBP  = bpMap[e.name] || e.category || 'อื่นๆ';
    const safeName = e.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const bpOpts   = BODY_PARTS.map(b => `<option value="${b}" ${b===curBP?'selected':''}>${b}</option>`).join('');
    return `<div class="ex-mgmt-item">
      <div class="ex-mgmt-name">
        ${esc(e.name)}
        ${e.isCustom ? '<span class="badge custom" style="font-size:9px;margin-left:5px">custom</span>' : ''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <select class="bp-sel" onchange="updateExBP('${safeName}',this.value)">${bpOpts}</select>
        <button class="icon-btn del" onclick="confirmDeleteEx('${safeName}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ══ Helpers ═══════════════════════════════════════════
const todayStr = () => new Date().toISOString().slice(0,10);
function metaStr(w) {
  const p=[];
  if (w.sets&&w.reps) p.push(`${w.sets}×${w.reps}`);
  if (Number(w.weight)) p.push(`${w.weight} kg`);
  if (Number(w.duration)) p.push(`${w.duration} นาที`);
  return p.join(' · ')||'—';
}
function relDate(d) {
  const diff=Math.floor((Date.now()-new Date(d+'T00:00:00'))/864e5);
  if (diff===0) return 'วันนี้';
  if (diff===1) return 'เมื่อวาน';
  if (diff<7)   return `${diff} วันก่อน`;
  return formatDate(d);
}
function formatDate(d) {
  if (!d) return '';
  const dt=new Date(d+'T00:00:00');
  return `${DAYS_TH[dt.getDay()]} ${dt.getDate()} ${MONTHS_TH[dt.getMonth()]} ${dt.getFullYear()+543}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
