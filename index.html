<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#09090d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>LIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat v10) -->
<script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090d;--s1:#0f0f14;--s2:#161620;--s3:#1e1e2a;--s4:#252533;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.11);
  --a:#c8ff3c;--a2:#a3d400;--a3:rgba(200,255,60,.1);
  --t:#eeeef4;--ts:#7a7a96;--td:#3a3a52;
  --err:#ff4f5a;--err2:rgba(255,79,90,.1);
  --ok:#3de87a;--ok2:rgba(61,232,122,.1);
  --r:10px;--r2:14px;--nav:66px;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--t);font-family:'Barlow',-apple-system,sans-serif;font-size:16px;min-height:100svh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}
.hidden{display:none!important}
#app{max-width:480px;margin:0 auto;min-height:100svh}
#v-auth{display:flex;align-items:center;justify-content:center;min-height:100svh;padding:28px 22px}
.auth-inner{width:100%;max-width:360px;animation:slideUp .4s var(--ease)}
.auth-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:82px;line-height:.88;color:var(--a);letter-spacing:3px;display:block;filter:drop-shadow(0 0 24px rgba(200,255,60,.3))}
.auth-tagline{font-size:10px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--ts);margin-top:8px}
.auth-brand{margin-bottom:40px}
.auth-tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:4px;margin-bottom:24px;border:1px solid var(--bd);gap:4px}
.auth-tab{flex:1;padding:10px;text-align:center;background:none;border:none;color:var(--ts);font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s var(--ease)}
.auth-tab.active{background:var(--s3);color:var(--t);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.field{margin-bottom:14px}
.field label{display:block;margin-bottom:5px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ts)}
.input{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);color:var(--t);font-size:16px;padding:12px 14px;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none;outline:none}
.input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(200,255,60,.09)}
.input::placeholder{color:var(--td)}
select.input{cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;background:var(--a);color:#000;border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:transform .15s,opacity .15s}
.btn:active{transform:scale(.97);opacity:.88}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--ts);border:1px solid var(--bd2);font-size:14px;font-family:'Barlow',sans-serif;font-weight:600;letter-spacing:0}
.btn-ghost:active{background:var(--s2)}
.btn-sm{display:inline-flex;align-items:center;justify-content:center;width:auto;padding:7px 14px;font-size:13px;border-radius:8px;white-space:nowrap;font-family:'Barlow',sans-serif;font-weight:600;letter-spacing:0}
.btn-danger{background:var(--err)!important;color:#fff!important}
.icon-btn{background:none;border:1px solid var(--bd);border-radius:7px;padding:5px 9px;color:var(--ts);cursor:pointer;font-size:12px;font-weight:600;transition:all .12s;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:4px}
.icon-btn:active{background:var(--s3)}
.icon-btn.del{border-color:rgba(255,79,90,.22);color:var(--err)}
.icon-btn.del:active{background:var(--err2)}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;background:rgba(9,9,13,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:27px;color:var(--a);letter-spacing:3px}
.header-right{display:flex;align-items:center;gap:10px}
.header-user{font-size:13px;color:var(--ts);font-weight:500;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-out{background:none;border:1px solid var(--bd2);color:var(--ts);border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.header-out:active{background:var(--s2)}
.tab-pane{overflow-y:auto;padding:18px 18px calc(var(--nav) + 24px)}
.tab-pane.entering{animation:tabIn .22s var(--ease) both}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav);display:flex;align-items:center;background:rgba(15,15,20,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--td);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:color .18s;position:relative}
.nav-btn.active{color:var(--a)}
.nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:2px;background:var(--a);border-radius:0 0 2px 2px}
.nav-btn svg{width:20px;height:20px;flex-shrink:0;transition:transform .18s var(--spring)}
.nav-btn.active svg{transform:scale(1.1)}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;height:100%;background:none;border:none;cursor:pointer;padding:0}
.nav-circle{width:50px;height:50px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(200,255,60,.3);transition:transform .18s var(--spring)}
.nav-circle:active{transform:scale(.9)}
.nav-circle svg{width:24px;height:24px;color:#000}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 14px}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:48px;line-height:1;color:var(--t);font-variant-numeric:tabular-nums}
.stat-num.accent{color:var(--a)}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ts);margin-top:5px}
.stat-wide{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.stat-wide-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ts);margin-bottom:6px}
.stat-wide-val{font-size:17px;font-weight:500}
.stat-big{display:flex;align-items:baseline;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:38px;line-height:1}
.stat-unit{font-size:13px;color:var(--ts);font-family:'Barlow',sans-serif;font-weight:400}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:18px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--ts)}
.wo-item{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--bd)}
.wo-item:last-child{border-bottom:none}
.wo-dot{width:7px;height:7px;border-radius:50%;background:var(--a);flex-shrink:0}
.wo-name{font-weight:500;font-size:15px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo-meta{font-size:12px;color:var(--ts)}
.wo-date{font-size:11px;color:var(--td);white-space:nowrap;flex-shrink:0}
.wo-del-btn{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:none;border:1px solid transparent;color:var(--td);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.wo-del-btn:active{background:var(--err2);color:var(--err);border-color:rgba(255,79,90,.2)}
.ex-block{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:12px;overflow:hidden;animation:slideUp .18s var(--ease)}
.ex-block:focus-within{border-color:rgba(200,255,60,.15)}
.ex-block-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 0}
.ex-block-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--a)}
.ex-block-del{background:none;border:none;color:var(--td);font-size:22px;line-height:1;cursor:pointer;padding:2px 6px;transition:color .12s}
.ex-block-del:active{color:var(--err)}
.ex-sel-wrap{padding:10px 14px 0}
.sets-table{padding:4px 14px 0}
.sets-header{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:6px;margin-bottom:4px}
.sets-col-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--td);text-align:center}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 32px;align-items:center;gap:6px;margin-bottom:6px}
.set-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--ts);text-align:center}
.set-inp{background:var(--s3);border:1px solid var(--bd2);border-radius:8px;color:var(--t);font-size:15px;font-weight:500;padding:9px 8px;text-align:center;outline:none;transition:border-color .12s;-webkit-appearance:none;width:100%}
.set-inp:focus{border-color:var(--a)}
.set-del{width:28px;height:28px;border-radius:7px;background:none;border:none;color:var(--td);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.set-del:active{background:var(--err2);color:var(--err)}
.add-set-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:calc(100% - 28px);margin:4px 14px 10px;padding:8px;background:var(--s3);border:1px dashed var(--bd2);border-radius:8px;color:var(--ts);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.add-set-btn:active{border-color:var(--a);color:var(--a);background:var(--s4)}
.ex-notes-row{padding:0 14px 12px}
.day-group{margin-bottom:20px}
.day-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--ts);padding-bottom:10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.day-del-btn{background:none;border:none;color:var(--td);font-size:12px;font-weight:600;cursor:pointer;padding:3px 8px;border-radius:6px;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.day-del-btn:active{background:var(--err2);color:var(--err)}
.hist-ex-group{padding:8px 0;border-bottom:1px solid var(--bd)}
.hist-ex-group:last-child{border-bottom:none}
.hist-ex-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-set-row{display:flex;align-items:center;gap:10px;padding:3px 0 3px 16px;font-size:12px}
.hist-set-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--td);width:26px;flex-shrink:0}
.hist-set-val{color:var(--t);font-weight:500}
.filter-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:100px;background:var(--s2);border:1px solid var(--bd);color:var(--ts);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.active{background:var(--a);border-color:var(--a);color:#000;box-shadow:0 2px 10px rgba(200,255,60,.2)}
.chart-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:12px;overflow:hidden}
.chart-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ts);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-label-r{font-size:10px;color:var(--a);font-weight:600;letter-spacing:0;text-transform:none}
.metric-tabs{display:flex;background:var(--s3);border-radius:9px;padding:3px;margin-bottom:12px}
.metric-tab{flex:1;text-align:center;padding:8px 4px;border-radius:7px;font-size:12px;font-weight:600;color:var(--ts);cursor:pointer;background:none;border:none;transition:all .18s}
.metric-tab.active{background:var(--s2);color:var(--t);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.prog-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.prog-kpi{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 8px;text-align:center}
.prog-kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;color:var(--a);display:block;margin-bottom:3px;line-height:1}
.prog-kpi-lbl{font-size:9px;color:var(--ts);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.no-data{text-align:center;padding:36px 0;font-size:13px;color:var(--ts);line-height:2.2}
.skel{background:linear-gradient(90deg,var(--s2) 0%,var(--s3) 50%,var(--s2) 100%);background-size:200% 100%;border-radius:6px;animation:shimmer 1.5s ease-in-out infinite}
@keyframes shimmer{to{background-position:-200% 0}}
#toast{position:fixed;bottom:calc(var(--nav) + 14px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--s3);border:1px solid var(--bd2);color:var(--t);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .22s var(--spring);max-width:calc(100vw - 40px);text-align:center;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--err);color:var(--err);background:rgba(255,79,90,.08)}
#toast.ok{border-color:var(--ok);color:var(--ok);background:rgba(61,232,122,.08)}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .35s}
#loader.fade{opacity:0;pointer-events:none}
.loader-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:72px;color:var(--a);letter-spacing:3px;animation:logoPulse 1.2s ease-in-out infinite;display:block;filter:drop-shadow(0 0 24px rgba(200,255,60,.4))}
.loader-bar{width:72px;height:2px;background:var(--s3);border-radius:1px;margin:14px auto 0;overflow:hidden}
.loader-fill{height:100%;background:var(--a);border-radius:1px;animation:barFill 1.2s ease-in-out infinite}
@keyframes logoPulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes barFill{0%{width:0%;margin-left:0}60%{width:80%;margin-left:0}100%{width:0%;margin-left:100%}}
.settings-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:14px;overflow:hidden}
.settings-hd{padding:13px 15px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.settings-hd-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--ts)}
.avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#000;box-shadow:0 0 14px rgba(200,255,60,.2)}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:600}
.badge.bp{background:var(--s3);color:var(--ts);border:1px solid var(--bd)}
.ex-mgmt-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd)}
.ex-mgmt-item:last-child{border-bottom:none}
.ex-mgmt-name{flex:1;font-size:14px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-edit-row{background:var(--s3);border-top:1px solid var(--bd);padding:10px 14px;display:flex;gap:7px;align-items:center}
.ex-edit-inp{flex:1;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;color:var(--t);font-size:14px;padding:8px 11px;outline:none;transition:border-color .12s}
.ex-edit-inp:focus{border-color:var(--a)}
.add-ex-form-wrap{background:var(--s3);border-top:1px solid var(--bd);padding:14px}
.bp-sel{background:var(--s3);border:1px solid var(--bd);color:var(--t);font-size:12px;border-radius:7px;padding:5px 10px;cursor:pointer;-webkit-appearance:none;appearance:none;max-width:110px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ts);pointer-events:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:0 12px 12px}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--s2);border:1px solid var(--bd2);border-radius:20px;padding:20px 18px;width:100%;max-width:440px;transform:translateY(18px);transition:transform .25s var(--spring)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px}
.modal-body{font-size:13px;color:var(--ts);margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{font-family:'Barlow',sans-serif;font-size:15px;font-weight:600;letter-spacing:0;padding:12px}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes tabIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* ── Planner ── */
.subtab-row{display:flex;background:var(--s2);border-radius:var(--r);padding:4px;gap:4px;margin-bottom:18px;border:1px solid var(--bd)}
.subtab{flex:1;padding:11px;text-align:center;background:none;border:none;color:var(--ts);font-size:15px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .18s var(--ease)}
.subtab.active{background:var(--s3);color:var(--t);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.plan-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:12px;overflow:hidden;transition:border-color .18s}
.plan-card.open{border-color:rgba(200,255,60,.22)}
.plan-card-head{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.plan-card-icon{width:44px;height:44px;border-radius:12px;background:var(--a3);border:1px solid rgba(200,255,60,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.plan-card-icon svg{width:22px;height:22px;color:var(--a)}
.plan-card-name{font-size:17px;font-weight:600;margin-bottom:3px}
.plan-card-meta{font-size:13px;color:var(--ts)}
.plan-chevron{margin-left:auto;flex-shrink:0;color:var(--td);transition:transform .2s var(--ease)}
.plan-card.open .plan-chevron{transform:rotate(180deg);color:var(--a)}
.plan-body{display:none;border-top:1px solid var(--bd)}
.plan-card.open .plan-body{display:block}
.plan-ex-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bd)}
.plan-ex-row:last-of-type{border-bottom:none}
.plan-ex-dot{width:8px;height:8px;border-radius:50%;background:var(--a);flex-shrink:0}
.plan-ex-name{flex:1;font-size:15px;font-weight:500}
.plan-ex-detail{font-size:13px;color:var(--ts);text-align:right;white-space:nowrap}
.plan-actions{display:flex;gap:10px;padding:14px 16px;background:var(--s3);border-top:1px solid var(--bd)}
.plan-actions .btn{font-family:'Barlow',sans-serif;font-size:15px;font-weight:600;letter-spacing:0;padding:12px}
/* Plan editor modal */
.plan-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .2s}
.plan-modal.show{opacity:1;pointer-events:auto}
.plan-modal-inner{background:var(--s1);margin-top:auto;border-radius:22px 22px 0 0;max-height:92svh;display:flex;flex-direction:column;transform:translateY(30px);transition:transform .28s var(--spring);padding-bottom:env(safe-area-inset-bottom)}
.plan-modal.show .plan-modal-inner{transform:translateY(0)}
.plan-modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.plan-modal-title{font-size:18px;font-weight:700}
.plan-modal-close{background:var(--s3);border:none;color:var(--ts);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.plan-modal-body{overflow-y:auto;flex:1;padding:16px 18px}
.plan-ex-block{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:12px;padding:14px;position:relative}
.plan-ex-block-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--td);font-size:24px;cursor:pointer;line-height:1;padding:2px 6px}
.plan-ex-block-del:active{color:var(--err)}
.plan-ex-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--a);margin-bottom:10px}
.plan-inp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
/* Use plan banner */
.use-plan-btn{width:100%;display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid rgba(200,255,60,.2);border-radius:var(--r2);padding:14px 16px;cursor:pointer;margin-bottom:16px;transition:border-color .15s,background .15s}
.use-plan-btn:active{background:var(--s3);border-color:var(--a)}
.use-plan-btn-icon{width:40px;height:40px;border-radius:10px;background:var(--a3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.use-plan-btn-icon svg{width:20px;height:20px;color:var(--a)}
.use-plan-btn-text{flex:1;text-align:left}
.use-plan-btn-title{font-size:15px;font-weight:600;margin-bottom:2px}
.use-plan-btn-sub{font-size:12px;color:var(--ts)}
/* Pick-plan sheet */
.pick-plan-sheet{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;padding:0 12px 12px}
.pick-plan-sheet.show{opacity:1;pointer-events:auto}
.pick-plan-inner{background:var(--s2);border-radius:20px;max-height:70svh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .25s var(--spring);padding-bottom:env(safe-area-inset-bottom)}
.pick-plan-sheet.show .pick-plan-inner{transform:translateY(0)}
.pick-plan-header{padding:18px 18px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pick-plan-title{font-size:17px;font-weight:700}
.pick-plan-list{overflow-y:auto;padding:8px 0}
.pick-plan-item{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.pick-plan-item:active{background:var(--s3)}
.pick-plan-item-icon{width:42px;height:42px;border-radius:11px;background:var(--a3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pick-plan-item-icon svg{width:20px;height:20px;color:var(--a)}
.pick-plan-item-name{font-size:16px;font-weight:600;margin-bottom:3px}
.pick-plan-item-meta{font-size:13px;color:var(--ts)}
</style>
</head>
<body>
<div id="loader"><div style="text-align:center"><span class="loader-logo">LIFT</span><div class="loader-bar"><div class="loader-fill"></div></div></div></div>
<div id="toast"></div>
<div id="confirm-modal" class="modal-overlay" onclick="closeConfirm(event)">
  <div class="modal-sheet">
    <div class="modal-title" id="confirm-title">ยืนยัน?</div>
    <div class="modal-body" id="confirm-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn btn-danger" id="confirm-ok">ลบ</button>
    </div>
  </div>
</div>
<!-- Plan Editor Modal -->
<div id="plan-modal" class="plan-modal" onclick="closePlanModal(event)">
  <div class="plan-modal-inner">
    <div class="plan-modal-header">
      <div class="plan-modal-title" id="plan-modal-title">สร้างแผนใหม่</div>
      <button class="plan-modal-close" onclick="closePlanModal()">×</button>
    </div>
    <div class="plan-modal-body">
      <div class="field"><label>ชื่อแผน</label><input id="plan-name-inp" class="input" type="text" placeholder="เช่น Push Day, Leg Day A"></div>
      <div id="plan-ex-list"></div>
      <button onclick="addPlanExBlock()" class="btn btn-ghost" style="margin-bottom:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-right:6px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>เพิ่มท่า
      </button>
    </div>
    <div style="padding:14px 18px;border-top:1px solid var(--bd);flex-shrink:0">
      <button id="btn-save-plan" onclick="savePlan()" class="btn">บันทึกแผน</button>
    </div>
  </div>
</div>
<!-- Pick Plan Sheet -->
<div id="pick-plan-sheet" class="pick-plan-sheet" onclick="closePickPlan(event)">
  <div class="pick-plan-inner">
    <div class="pick-plan-header">
      <div class="pick-plan-title">เลือกแผน</div>
      <button class="plan-modal-close" onclick="closePickPlan()">×</button>
    </div>
    <div class="pick-plan-list" id="pick-plan-list"></div>
  </div>
</div>
<div id="v-auth" class="view hidden">
  <div class="auth-inner">
    <div class="auth-brand"><span class="auth-logo">LIFT</span><div class="auth-tagline">Workout Tracker</div></div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="setAuthTab('login')">เข้าสู่ระบบ</button>
      <button class="auth-tab" id="tab-reg" onclick="setAuthTab('reg')">สมัครสมาชิก</button>
    </div>
    <form id="form-login" onsubmit="doLogin(event)">
      <div class="field"><label>ชื่อผู้ใช้</label><input id="l-user" class="input" type="text" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="username"></div>
      <div class="field" style="margin-bottom:22px"><label>รหัสผ่าน</label><input id="l-pass" class="input" type="password" autocomplete="current-password" placeholder="••••••"></div>
      <button id="btn-login" class="btn" type="submit">เข้าสู่ระบบ</button>
    </form>
    <form id="form-reg" class="hidden" onsubmit="doRegister(event)">
      <div class="field"><label>ชื่อที่แสดง</label><input id="r-name" class="input" type="text" autocapitalize="words" placeholder="ชื่อของคุณ"></div>
      <div class="field"><label>ชื่อผู้ใช้</label><input id="r-user" class="input" type="text" autocomplete="username" autocapitalize="off" spellcheck="false" placeholder="username (ภาษาอังกฤษ)"></div>
      <div class="field"><label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label><input id="r-pass" class="input" type="password" autocomplete="new-password" placeholder="••••••"></div>
      <div class="field" style="margin-bottom:22px"><label>ยืนยันรหัสผ่าน</label><input id="r-cfm" class="input" type="password" autocomplete="new-password" placeholder="••••••"></div>
      <button id="btn-reg" class="btn" type="submit">สมัครสมาชิก</button>
    </form>
  </div>
</div>

    <div class="header-logo">LIFT</div>

        <div class="field" style="margin-bottom:0"><label>ท่า</label><select id="prog-ex" class="input" onchange="onProgEx()"><option value="">ทั้งหมด</option></select></div>

    <div id="top-ex-card" class="chart-card" style="display:none">

    </div>

  <div id="tab-log" class="tab-pane hidden">

    </button>
    <div class="field" style="margin-bottom:18px"><label>วันที่</label><input id="log-date" class="input" type="date"></div>

    </button>
  </nav>
</div>

const db   = firebase.firestore();

// ── Firestore refs ─────────────────────────────────

// ── Exercise helpers ───────────────────────────────
function getAllEx(){ return S.exercises; }
function getExCat(name){ return S.exercises.find(e=>e.name===name)?.cat||'อื่นๆ'; }
function getDistinctBPs(){ return [...new Set(S.exercises.map(e=>e.cat||'อื่นๆ'))].sort(); }
function buildExOpts(){
  const groups={};
  S.exercises.forEach(e=>{(groups[e.cat]=groups[e.cat]||[]).push(e);});
  S.exOpts=Object.entries(groups).map(([cat,exs])=>`<optgroup label="${esc(cat)}">${exs.map(e=>`<option value="${esc(e.name)}">${esc(e.name)}</option>`).join('')}</optgroup>`).join('');
  document.querySelectorAll('.ex-sel').forEach(populateSel);
}
async function loadExercises(){
  const snap = await exCol().orderBy('name').get();
  S.exercises = snap.docs.map(d=>({ id:d.id, name:d.data().name, cat:d.data().category||'อื่นๆ' }));
  buildExOpts();
}

// ── Toast ──────────────────────────────────────────
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='show'+(type==='err'?' err':type==='ok'?' ok':'');
  clearTimeout(_tt);_tt=setTimeout(()=>(el.className=''),2800);
}

// ── Confirm ────────────────────────────────────────
function showConfirm(title,body,onOk,okLabel='ลบ'){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-body').textContent=body;
  const btn=document.getElementById('confirm-ok');
  btn.textContent=okLabel;
  btn.onclick=()=>{closeConfirm();onOk();};
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirm(e){
  if(e&&e.target!==document.getElementById('confirm-modal'))return;
  document.getElementById('confirm-modal').classList.remove('show');
}

// ── Loader ─────────────────────────────────────────
function hideSplash(){
  const l=document.getElementById('loader');
  l.classList.add('fade');
  setTimeout(()=>(l.style.display='none'),360);
}

// ── Init — Firebase Auth handles session automatically ─
function init(){
  // onAuthStateChanged fires on every page load
  // Firebase auto-restores session from IndexedDB (offline too)
  auth.onAuthStateChanged(async firebaseUser => {
    if(firebaseUser){
      // Load user profile from Firestore
      const doc = await db.collection('users').doc(firebaseUser.uid).get();
      S.user = {
        uid:         firebaseUser.uid,
        displayName: doc.data()?.displayName || firebaseUser.email.split('@')[0],
        username:    doc.data()?.username    || firebaseUser.email.split('@')[0],
      };
      await loadExercises();
      await loadPlans();
      showMain();
    } else {
      hideSplash();
      showAuth();
    }
  });
}

// ── Auth ───────────────────────────────────────────
// Username → Firebase email trick: username@liftapp.internal
const toEmail = u => u.toLowerCase().trim()+'@liftapp.internal';

function showAuth(){document.getElementById('v-auth').classList.remove('hidden');document.getElementById('v-main').classList.add('hidden');}
function setAuthTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-reg').classList.toggle('active',t==='reg');
  document.getElementById('form-login').classList.toggle('hidden',t!=='login');
  document.getElementById('form-reg').classList.toggle('hidden',t!=='reg');
}

async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('btn-login');
  const username=document.getElementById('l-user').value.trim();
  const password=document.getElementById('l-pass').value;
  if(!username||!password)return toast('กรอกข้อมูลให้ครบ','err');
  btn.disabled=true;btn.textContent='กำลังเข้า...';
  try{
    await auth.signInWithEmailAndPassword(toEmail(username),password);
    // onAuthStateChanged จะ handle showMain() ให้เอง
  }catch(err){
    btn.disabled=false;btn.textContent='เข้าสู่ระบบ';
    const msg={'auth/user-not-found':'ไม่พบผู้ใช้นี้','auth/wrong-password':'รหัสผ่านไม่ถูกต้อง','auth/invalid-credential':'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'};
    toast(msg[err.code]||err.message,'err');
  }
}

async function doRegister(e){
  e.preventDefault();
  const username   =document.getElementById('r-user').value.trim();
  const password   =document.getElementById('r-pass').value;
  const confirm    =document.getElementById('r-cfm').value;
  const displayName=document.getElementById('r-name').value.trim();
  if(!username||!password)return toast('กรอกข้อมูลให้ครบ','err');
  if(username.length<3)   return toast('username ต้องมีอย่างน้อย 3 ตัวอักษร','err');
  if(password.length<6)   return toast('รหัสผ่านต้องมีอย่างน้อย 6 ตัว','err');
  if(password!==confirm)  return toast('รหัสผ่านไม่ตรงกัน','err');
  const btn=document.getElementById('btn-reg');
  btn.disabled=true;btn.textContent='กำลังสมัคร...';
  try{
    const cred=await auth.createUserWithEmailAndPassword(toEmail(username),password);
    // Save profile to Firestore
    await db.collection('users').doc(cred.user.uid).set({
      username,
      displayName:displayName||username,
      createdAt:TS(),
    });
    // onAuthStateChanged จะ handle showMain()
  }catch(err){
    btn.disabled=false;btn.textContent='สมัครสมาชิก';
    const msg={'auth/email-already-in-use':'ชื่อผู้ใช้นี้ถูกใช้แล้ว'};
    toast(msg[err.code]||err.message,'err');
  }
}

async function doLogout(){
  await auth.signOut();
  S.user=null;S.exercises=[];S.exOpts='';S._pc=null;
  document.getElementById('v-main').classList.add('hidden');
  showAuth();
}

// ── Main ───────────────────────────────────────────

  document.getElementById('v-auth').classList.add('hidden');
  document.getElementById('v-main').classList.remove('hidden');

  ALL_TABS.forEach(t=>{

// ═══════════════ DASHBOARD ════════════════════════
async function loadDash(){
  document.getElementById('stats-wrap').innerHTML=skelStats();
  document.getElementById('dash-chart').innerHTML=`<div style="height:90px;display:flex;align-items:flex-end;gap:3px">${Array(30).fill('<div class="skel" style="flex:1;height:55%;border-radius:2px 2px 0 0"></div>').join('')}</div>`;

  const from30=new Date();from30.setDate(from30.getDate()-29);
  const fromStr=from30.toISOString().slice(0,10);

  // Fetch last 30 days in parallel with all-time stats
  const [recentSnap, allSnap] = await Promise.all([
    woCol().where('date','>=',fromStr).orderBy('date','desc').get(),
    woCol().get(),
  ]);

  const recent   = recentSnap.docs.map(d=>({...d.data(),workoutId:d.id}));
  const allWO    = allSnap.docs.map(d=>({...d.data(),workoutId:d.id}));
  const statsData= computeStats(allWO);

  renderStats(statsData);
  renderDashChart(recent);
}

function computeStats(workouts){
  const weekAgo=new Date(Date.now()-7*864e5).toISOString().slice(0,10);
  let totalKg=0;
  const exMap={},dates=new Set(),weekDates=new Set();
  workouts.forEach(w=>{
    dates.add(w.date);
    totalKg+=(w.weight||0)*(w.reps||0);
    exMap[w.exerciseName]=(exMap[w.exerciseName]||0)+1;
    if(w.date>=weekAgo)weekDates.add(w.date);
  });
  const weeklyStreak=calcWeeklyStreak([...dates]);
  const top=Object.entries(exMap).sort((a,b)=>b[1]-a[1])[0];
  return{totalSessions:dates.size,weekSessions:weekDates.size,totalWeight:Math.round(totalKg),favoriteExercise:top?top[0]:'—',weeklyStreak};
}

function calcWeeklyStreak(dateStrings){
  if(!dateStrings.length)return 0;
  function getMon(ds){const d=new Date(ds+'T00:00:00Z');const day=d.getUTCDay();d.setUTCDate(d.getUTCDate()-(day===0?6:day-1));return d.toISOString().slice(0,10);}
  const weeks=new Set(dateStrings.map(getMon));
  let cur=getMon(new Date().toISOString().slice(0,10)),streak=0;
  while(weeks.has(cur)){streak++;const d=new Date(cur+'T00:00:00Z');d.setUTCDate(d.getUTCDate()-7);cur=d.toISOString().slice(0,10);}
  return streak;
}

function skelRecent(n){return Array(n).fill(0).map(()=>`<div class="wo-item"><div class="skel" style="width:7px;height:7px;border-radius:50%;flex-shrink:0"></div><div style="flex:1;min-width:0"><div class="skel" style="height:14px;width:96px;margin-bottom:5px;border-radius:4px"></div><div class="skel" style="height:11px;width:64px;border-radius:4px"></div></div><div class="skel" style="height:11px;width:38px;border-radius:4px"></div></div>`).join('');}

  const flames=streak>=8?'🔥🔥🔥':streak>=4?'🔥🔥':streak>=1?'🔥':'';
  const bars=Array.from({length:Math.min(streak,8)},(_,i)=>`<div style="height:5px;flex:1;border-radius:3px;background:${sc};opacity:${0.4+0.075*i}"></div>`).join('');
  const empties=streak<8?Array.from({length:8-streak},()=>`<div style="height:5px;flex:1;border-radius:3px;background:var(--s3)"></div>`).join(''):'';
  document.getElementById('stats-wrap').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card" style="animation:countUp .35s ease"><div class="stat-num accent">${d.weekSessions}</div><div class="stat-lbl">สัปดาห์นี้</div></div>
      <div class="stat-card" style="animation:countUp .35s .06s ease both"><div class="stat-num">${d.totalSessions}</div><div class="stat-lbl">ทั้งหมด</div></div>
    </div>
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:15px 17px;margin-bottom:10px;display:flex;align-items:center;gap:16px;animation:countUp .35s .09s ease both">
      <div style="text-align:center;flex-shrink:0">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:52px;line-height:1;color:${sc}">${streak}</div>
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ts);margin-top:2px">WEEKS</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;margin-bottom:4px">Weekly Streak ${flames}</div>
        <div style="font-size:11px;color:var(--ts);margin-bottom:8px">${streak?`${streak} สัปดาห์ติดต่อกัน`:'เริ่ม streak สัปดาห์นี้เลย!'}</div>
        <div style="display:flex;gap:3px">${bars}${empties}</div>
      </div>
    </div>
    <div class="stat-wide" style="animation:countUp .35s .13s ease both"><div class="stat-wide-lbl">ท่าที่ชอบ</div><div class="stat-wide-val">${esc(d.favoriteExercise||'—')}</div></div>
    <div class="stat-wide" style="animation:countUp .35s .17s ease both"><div class="stat-wide-lbl">น้ำหนักรวมที่ยก</div><div class="stat-big"><span>${d.totalWeight.toLocaleString()}</span><span class="stat-unit">kg</span></div></div>`;
}

function renderDashChart(workouts){
  const today=new Date(),todayStr=today.toISOString().slice(0,10);
  const days=[];
  for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push({date:d.toISOString().slice(0,10),d,count:0});}
  workouts.forEach(w=>{const f=days.find(x=>x.date===w.date);if(f)f.count++;});
  document.getElementById('dash-meta').textContent=`${days.filter(d=>d.count>0).length} วันที่ออกกำลังกาย`;
  const maxV=Math.max(...days.map(d=>d.count),1);
  const W=360,H=110,PL=6,PR=6,PT=14,PB=28,cW=W-PL-PR,cH=H-PT-PB,n=days.length;
  const xs=i=>PL+(i/(n-1))*cW,ys=v=>PT+cH-(v/maxV)*cH;
  const pts=days.map((d,i)=>`${xs(i).toFixed(1)},${ys(d.count).toFixed(1)}`).join(' ');
  const areaPts=`${xs(0).toFixed(1)},${(PT+cH).toFixed(1)} ${pts} ${xs(n-1).toFixed(1)},${(PT+cH).toFixed(1)}`;
  const yLines=[0,.5,1].map(t=>`<line x1="${PL}" y1="${ys(maxV*t).toFixed(1)}" x2="${W-PR}" y2="${ys(maxV*t).toFixed(1)}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`).join('');
  const xLabels=days.map((d,i)=>{
    if(i!==0&&i!==14&&i!==n-1)return'';
    const isT=d.date===todayStr,lbl=isT?'วันนี้':`${d.d.getDate()}/${d.d.getMonth()+1}`;
    return`<text x="${xs(i).toFixed(1)}" y="${H-5}" text-anchor="${i===0?'start':i===n-1?'end':'middle'}" fill="${isT?'#c8ff3c':'#7a7a96'}" font-size="10" font-weight="${isT?'700':'400'}" font-family="Barlow,sans-serif">${lbl}</text>`;
  }).join('');
  const dots=days.map((d,i)=>{
    if(!d.count)return'';
    const isT=d.date===todayStr,cx=xs(i).toFixed(1),cy=ys(d.count).toFixed(1);
    return`<circle cx="${cx}" cy="${cy}" r="${isT?5.5:3.5}" fill="${isT?'#c8ff3c':'rgba(200,255,60,.8)'}" stroke="#09090d" stroke-width="2"/>${isT?`<circle cx="${cx}" cy="${cy}" r="9" fill="none" stroke="rgba(200,255,60,.18)" stroke-width="1.5"/>`:''}`;
  }).join('');
  document.getElementById('dash-chart').innerHTML=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    <defs><linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c8ff3c" stop-opacity="0.14"/><stop offset="100%" stop-color="#c8ff3c" stop-opacity="0"/></linearGradient></defs>
    ${yLines}<polygon points="${areaPts}" fill="url(#dg)"/>
    <polyline points="${pts}" fill="none" stroke="#c8ff3c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${xLabels}</svg>`;
}

async function loadProg(){populateProgFilters();await renderProg();}

function onProgEx(){S.pf.ex=document.getElementById('prog-ex').value;renderProg();}
function populateProgFilters(){
  const bpSel=document.getElementById('prog-bp');
  bpSel.innerHTML=`<option value="">ทั้งหมด</option>`+getDistinctBPs().map(b=>`<option value="${esc(b)}" ${b===S.pf.bp?'selected':''}>${esc(b)}</option>`).join('');
  populateProgExSel();
  document.querySelectorAll('#metric-tabs .metric-tab').forEach(c=>c.classList.toggle('active',c.dataset.m===S.pf.metric));
  document.querySelectorAll('#period-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.p===S.pf.period));
}
function populateProgExSel(){
  const sel=document.getElementById('prog-ex'),bp=S.pf.bp;
  const filt=bp?getAllEx().filter(e=>e.cat===bp):getAllEx();
  sel.innerHTML=`<option value="">ทั้งหมด</option>`+filt.map(e=>`<option value="${esc(e.name)}" ${e.name===S.pf.ex?'selected':''}>${esc(e.name)}</option>`).join('');
}
function getPeriodRange(){
  const p=S.pf.period;if(p==='all')return{from:'',to:''};
  const to=new Date(),from=new Date();from.setDate(to.getDate()-parseInt(p));
  return{from:from.toISOString().slice(0,10),to:to.toISOString().slice(0,10)};
}
async function renderProg(){
  document.getElementById('prog-kpi').innerHTML=[0,1,2].map(()=>`<div class="prog-kpi"><div class="skel" style="height:24px;width:48px;margin:0 auto 5px;border-radius:5px"></div><div class="skel" style="height:8px;width:36px;margin:0 auto;border-radius:4px"></div></div>`).join('');
  document.getElementById('prog-chart').innerHTML=`<div style="height:130px;display:flex;align-items:flex-end;gap:3px">${Array(12).fill('<div class="skel" style="flex:1;border-radius:3px 3px 0 0"></div>').join('')}</div>`;

  const{from,to}=getPeriodRange();
  document.getElementById('prog-chart-range').textContent=from?`${from.slice(5).replace('-','/')} – ${to.slice(5).replace('-','/')}`:'ทั้งหมด';

  const ck=S.pf.period;
  let workouts;
  if(S._pc?.key===ck){workouts=S._pc.data;}
  else{
    // Firestore query — filter by date range (requires composite index on date)
    let q=woCol().orderBy('date','desc');
    if(from)q=q.where('date','>=',from);
    if(to)  q=q.where('date','<=',to);
    try{
      const snap=await q.get();
      workouts=snap.docs.map(d=>({...d.data(),workoutId:d.id}));
      S._pc={key:ck,data:workouts};
    }catch(err){
      // Composite index not created yet — show link hint
      if(err.code==='failed-precondition'){
        document.getElementById('prog-chart').innerHTML=`<div class="no-data" style="font-size:12px;line-height:2">ต้องสร้าง Index ก่อน<br><a href="${err.message.match(/https[^\s]+/)?.[0]||'https://console.firebase.google.com'}" target="_blank" style="color:var(--a)">คลิกที่นี่เพื่อสร้าง Index อัตโนมัติ ↗</a></div>`;
        document.getElementById('prog-kpi').innerHTML='';
        return;
      }
      document.getElementById('prog-chart').innerHTML=`<div class="no-data">${esc(err.message)}</div>`;
      return;
    }
  }

  const{bp,ex:exName,metric}=S.pf;
  let filt=workouts;
  if(bp&&!exName)filt=workouts.filter(w=>getExCat(w.exerciseName)===bp);
  if(exName)     filt=workouts.filter(w=>w.exerciseName===exName);

  if(exName){
    const ld=buildLineData(filt,metric);
    renderKPIs(calcKPIs(filt,metric),metric);
    document.getElementById('prog-chart-label').textContent=`${exName} — ${metricLbl(metric)}`;
    document.getElementById('top-ex-card').style.display='none';
    document.getElementById('prog-chart').innerHTML=ld.length?svgLine(ld,metric,true):`<div class="no-data">ยังไม่มีข้อมูลในช่วงนี้ 📭</div>`;
  }else if(bp){
    if(metric==='sessions'){
      const grp={};filt.forEach(w=>{if(!grp[w.exerciseName])grp[w.exerciseName]=new Set();grp[w.exerciseName].add(w.date);});
      const bar=Object.entries(grp).sort((a,b)=>b[1].size-a[1].size).slice(0,10).map(([l,s])=>({l,v:s.size}));
      renderKPIsOv(filt);document.getElementById('prog-chart-label').textContent=`${bp} — Sessions`;
      document.getElementById('top-ex-card').style.display='none';
      document.getElementById('prog-chart').innerHTML=bar.length?svgBar(bar):`<div class="no-data">ยังไม่มีข้อมูล 📭</div>`;
    }else{
      const top5=Object.entries(filt.reduce((g,w)=>{g[w.exerciseName]=(g[w.exerciseName]||0)+1;return g;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n])=>n);
      const series=top5.map(n=>({name:n,data:buildLineData(filt.filter(w=>w.exerciseName===n),metric)})).filter(s=>s.data.length);
      const kpiEx=series[0]?.name||'';
      renderKPIs(kpiEx?calcKPIs(filt.filter(w=>w.exerciseName===kpiEx),metric):{pr:0,sessions:0,avg:0},metric);
      document.getElementById('prog-chart-label').textContent=`${bp} — ${metricLbl(metric)} (Top ${series.length} ท่า)`;
      document.getElementById('top-ex-card').style.display='none';
      document.getElementById('prog-chart').innerHTML=series.length?svgMultiLine(series,metric):`<div class="no-data">ยังไม่มีข้อมูล 📭</div>`;
    }
  }else{
    const ld=buildLineData(filt,metric==='sessions'?'sessions':metric);
    renderKPIsOv(filt);
    document.getElementById('prog-chart-label').textContent=metric==='sessions'?'Sessions ต่อวัน':`${metricLbl(metric)} รายวัน`;
    document.getElementById('prog-chart').innerHTML=ld.length?svgLine(ld,metric,false):`<div class="no-data">ยังไม่มีข้อมูล 🏋️</div>`;
    renderTopEx(filt);
  }
}

function buildLineData(ws,m){
  const grp={};ws.forEach(w=>{if(!grp[w.date])grp[w.date]=[];grp[w.date].push(w);});
  return Object.entries(grp).sort(([a],[b])=>a.localeCompare(b)).map(([date,items])=>{
    let v=0;
    if(m==='weight') v=Math.max(...items.map(w=>Number(w.weight)||0));
    if(m==='volume') v=items.reduce((s,w)=>s+(Number(w.reps)||0)*(Number(w.weight)||0),0);
    if(m==='reps')   v=Math.max(...items.map(w=>Number(w.reps)||0));
    if(m==='sessions')v=items.length;
    return{date,v};
  }).filter(d=>d.v>0);
}
function calcKPIs(ws,m){
  const daily=buildLineData(ws,m);
  if(!daily.length)return{pr:0,sessions:0,avg:0};
  return{pr:Math.max(...daily.map(d=>d.v)),sessions:daily.length,avg:daily.reduce((s,d)=>s+d.v,0)/daily.length};
}
function renderKPIs({pr,sessions,avg},m){
  const u=m==='weight'?' kg':'';
  document.getElementById('prog-kpi').innerHTML=`<div class="prog-kpi"><span class="prog-kpi-val">${fmt(pr)}${u}</span><div class="prog-kpi-lbl">PR</div></div><div class="prog-kpi"><span class="prog-kpi-val">${sessions}</span><div class="prog-kpi-lbl">Sessions</div></div><div class="prog-kpi"><span class="prog-kpi-val">${fmt(avg)}${u}</span><div class="prog-kpi-lbl">เฉลี่ย</div></div>`;
}
function renderKPIsOv(ws){
  const sessions=[...new Set(ws.map(w=>w.date))].length,exCount=[...new Set(ws.map(w=>w.exerciseName))].length;
  const vol=ws.reduce((s,w)=>s+(Number(w.reps)||0)*(Number(w.weight)||0),0);
  document.getElementById('prog-kpi').innerHTML=`<div class="prog-kpi"><span class="prog-kpi-val">${sessions}</span><div class="prog-kpi-lbl">Sessions</div></div><div class="prog-kpi"><span class="prog-kpi-val">${exCount}</span><div class="prog-kpi-lbl">ท่า</div></div><div class="prog-kpi"><span class="prog-kpi-val">${vol>=1000?(vol/1000).toFixed(1)+'k':Math.round(vol)}</span><div class="prog-kpi-lbl">Volume</div></div>`;
}
function renderTopEx(ws){
  const grp={};ws.forEach(w=>{grp[w.exerciseName]=(grp[w.exerciseName]||0)+1;});
  const top=Object.entries(grp).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const card=document.getElementById('top-ex-card');
  if(!top.length){card.style.display='none';return;}
  card.style.display='block';const mx=top[0][1];
  document.getElementById('top-ex-list').innerHTML=top.map(([name,count],i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:${i<top.length-1?'1px solid var(--bd)':'none'}">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--td);width:16px;flex-shrink:0">${i+1}</span>
      <span style="flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span>
      <div style="width:70px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0"><div style="height:100%;width:${(count/mx*100).toFixed(0)}%;background:var(--a);border-radius:2px"></div></div>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--a);width:24px;text-align:right;flex-shrink:0">${count}</span>
    </div>`).join('');
}
const fmt=n=>Number.isFinite(n)?Math.round(n*10)/10:0;
const metricLbl=m=>({weight:'น้ำหนัก (kg)',volume:'Volume',reps:'Reps',sessions:'Sessions'}[m]||m);

// ── SVG Charts ─────────────────────────────────────
function svgLine(data,metric,showTrend=false){
  const W=360,H=190,PL=46,PR=14,PT=12,PB=36,cW=W-PL-PR,cH=H-PT-PB;
  const vals=data.map(d=>d.v),minV=Math.min(...vals),maxV=Math.max(...vals),vR=maxV-minV||1;
  const xs=i=>PL+(i/Math.max(data.length-1,1))*cW,ys=v=>PT+cH-((v-minV)/vR)*cH;
  const yLines=[0,.33,.67,1].map(t=>{const v=minV+vR*t,y=ys(v).toFixed(1);const lbl=metric==='volume'&&v>=1000?(v/1000).toFixed(1)+'k':Math.round(v);return`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/><text x="${PL-4}" y="${(parseFloat(y)+4).toFixed(1)}" text-anchor="end" fill="#7a7a96" font-size="10" font-family="Barlow,sans-serif">${lbl}</text>`;}).join('');
  const step=Math.max(1,Math.ceil(data.length/5));
  const idxs=[...new Set([0,...data.map((_,i)=>i).filter(i=>i%step===0),data.length-1])];
  const xLabels=idxs.map(i=>{const dt=new Date(data[i].date+'T00:00:00');return`<text x="${xs(i).toFixed(1)}" y="${H-5}" text-anchor="middle" fill="#7a7a96" font-size="10" font-family="Barlow,sans-serif">${dt.getDate()} ${MONTHS_TH[dt.getMonth()]}</text>`;}).join('');
  const pts=data.map((d,i)=>`${xs(i).toFixed(1)},${ys(d.v).toFixed(1)}`).join(' ');
  const areaPts=`${PL},${(PT+cH).toFixed(1)} ${pts} ${(W-PR).toFixed(1)},${(PT+cH).toFixed(1)}`;
  const dotR=data.length<=14?4.5:data.length<=30?3.5:2.5;
  const dots=data.map((d,i)=>`<circle cx="${xs(i).toFixed(1)}" cy="${ys(d.v).toFixed(1)}" r="${dotR}" fill="#c8ff3c" stroke="#09090d" stroke-width="2"/>`).join('');
  let trendSvg='';
  if(showTrend&&data.length>=3){
    const n=data.length,sumX=n*(n-1)/2,sumX2=n*(n-1)*(2*n-1)/6,sumY=data.reduce((s,d)=>s+d.v,0),sumXY=data.reduce((s,d,i)=>s+i*d.v,0);
    const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX),intercept=(sumY-slope*sumX)/n;
    const ty0=intercept,ty1=slope*(n-1)+intercept;
    const ty0c=Math.max(minV,Math.min(maxV,ty0)),ty1c=Math.max(minV,Math.min(maxV,ty1));
    trendSvg=`<line x1="${xs(0).toFixed(1)}" y1="${ys(ty0c).toFixed(1)}" x2="${xs(n-1).toFixed(1)}" y2="${ys(ty1c).toFixed(1)}" stroke="rgba(200,255,60,.35)" stroke-width="1.5" stroke-dasharray="5,4"/>`;
    const pct=ty0>0?((ty1-ty0)/ty0*100):0;
    if(Math.abs(pct)>0.5){const up=pct>0;trendSvg+=`<text x="${W-PR-2}" y="${PT-2}" text-anchor="end" fill="${up?'#c8ff3c':'#ff4f5a'}" font-size="10" font-weight="700" font-family="Barlow,sans-serif">${up?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</text>`;}
  }
  return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c8ff3c" stop-opacity="0.15"/><stop offset="100%" stop-color="#c8ff3c" stop-opacity="0"/></linearGradient></defs>
    ${yLines}<polygon points="${areaPts}" fill="url(#ag)"/>
    <polyline points="${pts}" fill="none" stroke="#c8ff3c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${trendSvg}${dots}${xLabels}</svg>`;
}
const MULTI_COLORS=['#c8ff3c','#38bdf8','#fb923c','#a78bfa','#f472b6'];
function svgMultiLine(series,metric){
  if(!series.length)return'<div class="no-data">ไม่มีข้อมูล</div>';
  const allDates=[...new Set(series.flatMap(s=>s.data.map(d=>d.date)))].sort();
  if(allDates.length<2)return`<svg viewBox="0 0 360 40" style="width:100%"><text x="180" y="24" text-anchor="middle" fill="#7a7a96" font-size="12" font-family="Barlow,sans-serif">ต้องมีอย่างน้อย 2 วัน</text></svg>`;
  const allVals=series.flatMap(s=>s.data.map(d=>d.v)),minV=Math.min(...allVals),maxV=Math.max(...allVals),vR=maxV-minV||1;
  const n=allDates.length,W=360,H=200,PL=46,PR=14,PT=12,PB=44,cW=W-PL-PR,cH=H-PT-PB;
  const xs=i=>PL+(i/(n-1))*cW,ys=v=>PT+cH-((v-minV)/vR)*cH;
  const yLines=[0,.5,1].map(t=>{const v=minV+vR*t,y=ys(v).toFixed(1);const lbl=metric==='volume'&&v>=1000?(v/1000).toFixed(1)+'k':Math.round(v);return`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/><text x="${PL-4}" y="${(parseFloat(y)+4).toFixed(1)}" text-anchor="end" fill="#7a7a96" font-size="10" font-family="Barlow,sans-serif">${lbl}</text>`;}).join('');
  const step=Math.max(1,Math.ceil(n/4));
  const idxs=[...new Set([0,...allDates.map((_,i)=>i).filter(i=>i%step===0),n-1])];
  const xLabels=idxs.map(i=>{const dt=new Date(allDates[i]+'T00:00:00');return`<text x="${xs(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" fill="#7a7a96" font-size="10" font-family="Barlow,sans-serif">${dt.getDate()} ${MONTHS_TH[dt.getMonth()]}</text>`;}).join('');
  const lines=series.map((s,si)=>{const color=MULTI_COLORS[si%MULTI_COLORS.length];const dateMap=Object.fromEntries(s.data.map(d=>[d.date,d.v]));const validPts=allDates.map((dt,i)=>dateMap[dt]!=null?{i,v:dateMap[dt]}:null).filter(Boolean);if(!validPts.length)return'';const pts=validPts.map(p=>`${xs(p.i).toFixed(1)},${ys(p.v).toFixed(1)}`).join(' ');const dots=validPts.map(p=>`<circle cx="${xs(p.i).toFixed(1)}" cy="${ys(p.v).toFixed(1)}" r="3" fill="${color}" stroke="#09090d" stroke-width="1.5"/>`).join('');return`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>${dots}`;}).join('');
  const legend=series.map((s,si)=>{const color=MULTI_COLORS[si%MULTI_COLORS.length];const lbl=s.name.length>12?s.name.slice(0,12)+'…':s.name;const lx=PL+(si%3)*(cW/3),ly=H-PB+26+(Math.floor(si/3)*14);return`<circle cx="${lx+5}" cy="${ly-4}" r="4" fill="${color}"/><text x="${lx+13}" y="${ly}" fill="#eeeef4" font-size="10" font-family="Barlow,sans-serif">${esc(lbl)}</text>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${yLines}${lines}${xLabels}${legend}</svg>`;
}
function svgBar(data){
  if(!data.length)return'<div class="no-data">ไม่มีข้อมูล</div>';
  const maxV=Math.max(...data.map(d=>d.v));
  const rowH=32,gap=7,W=360,PL=74,PR=44,bW=W-PL-PR,H=data.length*(rowH+gap)+gap;
  const bars=data.map((d,i)=>{const y=gap+i*(rowH+gap),bw=Math.max((d.v/maxV)*bW,4);const lbl=d.l.length>9?d.l.slice(0,9)+'…':d.l;return`<text x="${PL-8}" y="${(y+rowH*.66).toFixed(1)}" text-anchor="end" fill="#eeeef4" font-size="12" font-weight="500" font-family="Barlow,sans-serif">${esc(lbl)}</text><rect x="${PL}" y="${y+7}" width="${bw.toFixed(1)}" height="${rowH-14}" rx="5" fill="rgba(200,255,60,.75)"/><text x="${(PL+bw+7).toFixed(1)}" y="${(y+rowH*.66).toFixed(1)}" fill="#7a7a96" font-size="12" font-weight="600" font-family="Barlow Condensed,sans-serif">${d.v}</text>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${bars}</svg>`;
}

async function saveWorkout(){
  const date=document.getElementById('log-date').value;
  if(!date)return toast('กรุณาเลือกวันที่','err');
  const blocks=[...document.querySelectorAll('.ex-block')];
  const docs=[];
  for(let i=0;i<blocks.length;i++){
    const block=blocks[i],sel=block.querySelector('.ex-sel'),cust=block.querySelector('.custom-ex');
    const exName=sel.value==='__custom'?cust.value.trim():sel.value;
    if(!exName)return toast(`กรุณาเลือกท่า ${i+1}`,'err');
    const notes=block.querySelector('[name=notes]').value||'';
    [...block.querySelectorAll('.sets-list .set-row')].forEach((row,j)=>{
      docs.push({date,exerciseName:exName,sets:1,reps:Number(row.querySelector('[name=reps]').value)||0,weight:Number(row.querySelector('[name=weight]').value)||0,duration:0,notes:j===0?notes:'',createdAt:TS()});
    });
  }
  if(!docs.length)return toast('ไม่มีข้อมูล','err');
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    // Batch write — faster than multiple addDoc calls
    const batch=db.batch();
    docs.forEach(d=>batch.set(woCol().doc(),d));
    await batch.commit();
    S._pc=null;
    toast('บันทึกสำเร็จ 💪','ok');
    initLog();
  }catch(err){toast(err.message||'บันทึกไม่สำเร็จ','err');}
  finally{btn.disabled=false;btn.textContent='บันทึก Workout 💪';}
}

function confirmDelWOs(idxArr,exName){showConfirm(`ลบ ${esc(exName)}?`,`${idxArr.length} set จะถูกลบถาวร`,()=>deleteWOs(idxArr));}
async function deleteWOs(idxArr){
  const items=idxArr.map(i=>S._hd[i]).filter(Boolean);
  if(!items.length)return toast('ไม่พบข้อมูล','err');
  try{
    const batch=db.batch();
    items.forEach(w=>batch.delete(woCol().doc(w.workoutId)));
    await batch.commit();
    const ds=new Set(idxArr);S._hd=S._hd.filter((_,i)=>!ds.has(i));S._pc=null;
    toast('ลบเรียบร้อย','ok');renderHist(S._hd);
  }catch(err){toast(err.message||'ลบไม่สำเร็จ','err');}
}
function confirmDelDay(date){const cnt=S._hd.filter(w=>w.date===date).length;showConfirm('ลบทั้งวัน?',`ลบ ${cnt} รายการของวันที่ ${formatDate(date)}`,()=>deleteDay(date));}
async function deleteDay(date){
  try{
    const snap=await woCol().where('date','==',date).get();
    const batch=db.batch();snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    S._hd=S._hd.filter(w=>w.date!==date);S._pc=null;
    toast(`ลบวัน ${formatDate(date)} แล้ว`,'ok');renderHist(S._hd);
  }catch(err){toast(err.message||'ลบไม่สำเร็จ','err');}
}

      <div class="field" style="margin-bottom:0"><label>Reps</label><input class="input plan-reps" type="number" min="1" value="${prefill?.reps||10}" inputmode="numeric" style="text-align:center"></div>
      <div class="field" style="margin-bottom:0"><label>kg</label><input class="input plan-weight" type="number" min="0" step="0.5" value="${prefill?.weight||''}" inputmode="decimal" placeholder="0" style="text-align:center"></div>

function delPlanExBlock(btn){
  const list=document.getElementById('plan-ex-list');
  if(list.children.length<=1)return toast('ต้องมีอย่างน้อย 1 ท่า','err');
  btn.closest('.plan-ex-block').remove();

function reNumberPlanExBlocks(){
  document.querySelectorAll('#plan-ex-list .plan-ex-num').forEach((el,i)=>el.textContent='EXERCISE '+(i+1));
}

async function savePlan(){
  const name=document.getElementById('plan-name-inp').value.trim();
  if(!name)return toast('กรุณาใส่ชื่อแผน','err');
  const blocks=[...document.querySelectorAll('#plan-ex-list .plan-ex-block')];
  const exercises=[];
  for(let i=0;i<blocks.length;i++){
    const exName=blocks[i].querySelector('.plan-ex-sel').value;
    if(!exName)return toast(`กรุณาเลือกท่า ${i+1}`,'err');
    exercises.push({
      exerciseName: exName,
      sets:   Number(blocks[i].querySelector('.plan-sets').value)||3,
      reps:   Number(blocks[i].querySelector('.plan-reps').value)||10,
      weight: Number(blocks[i].querySelector('.plan-weight').value)||0,
    });
  }
  const btn=document.getElementById('btn-save-plan');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    if(S.editingPlanId){
      await planCol().doc(S.editingPlanId).update({name,exercises,updatedAt:TS()});
      toast('อัปเดตแผนสำเร็จ ✓','ok');
    }else{
      await planCol().add({name,exercises,createdAt:TS()});
      toast(`สร้าง "${name}" สำเร็จ ✓`,'ok');
    }
    await loadPlans();
    closePlanModal();
    renderPlans();
  }catch(err){toast(err.message||'บันทึกไม่สำเร็จ','err');}
  finally{btn.disabled=false;btn.textContent='บันทึกแผน';}
}

function confirmDeletePlan(id,name){
  showConfirm('ลบแผน?',`"${name}" จะถูกลบถาวร`,async()=>{
    try{
      await planCol().doc(id).delete();
      await loadPlans();
      renderPlans();
      toast('ลบแผนแล้ว','ok');
    }catch(err){toast(err.message||'ลบไม่สำเร็จ','err');}
  });
}

function applyPlan(id){
  const plan=S.plans.find(p=>p.id===id);
  if(!plan)return;
  // Reset log form
  document.getElementById('log-exercises').innerHTML='';
  // Fill with plan exercises — each exercise gets N set rows
  (plan.exercises||[]).forEach((ex,i)=>{
    addExBlock();
    const blocks=[...document.querySelectorAll('.ex-block')];
    const block=blocks[blocks.length-1];
    const sel=block.querySelector('.ex-sel');
    sel.value=ex.exerciseName;
    // Fill set rows with target weight
    const sl=block.querySelector('.sets-list');
    sl.innerHTML='';
    const sets=Number(ex.sets)||1;
    for(let s=1;s<=sets;s++){
      addSetRow(sl,s);
      const rows=[...sl.querySelectorAll('.set-row')];
      const row=rows[rows.length-1];
      row.querySelector('[name=reps]').value=ex.reps||10;
      row.querySelector('[name=weight]').value=ex.weight||'';
    }
  });
  // Update banner
  document.getElementById('use-plan-title').textContent=plan.name;
  document.getElementById('use-plan-sub').textContent=`${(plan.exercises||[]).length} ท่า · โหลดแล้ว ✓`;
  toast(`โหลดแผน "${plan.name}" แล้ว 💪`,'ok');
}

function startFromPlan(id){
  applyPlan(id);
  setTab('log');
}

// ── Helpers ────────────────────────────────────────
const todayStr  =()=>new Date().toISOString().slice(0,10);
function metaStr(w){const p=[];if(w.reps)p.push(`${w.reps} reps`);if(Number(w.weight))p.push(`${w.weight} kg`);return p.join(' × ')||'—';}
function relDate(d){const diff=Math.floor((Date.now()-new Date(d+'T00:00:00'))/864e5);if(diff===0)return'วันนี้';if(diff===1)return'เมื่อวาน';if(diff<7)return`${diff} วันก่อน`;return formatDate(d);}
function formatDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return`${DAYS_TH[dt.getDay()]} ${dt.getDate()} ${MONTHS_TH[dt.getMonth()]} ${dt.getFullYear()+543}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
