<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>LIFT — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Vars ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b0e;--s1:#111116;--s2:#18181f;--s3:#222229;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --a:#c8ff3c;--a2:#99cc00;
  --t:#eeeef2;--ts:#8888a0;--td:#44444f;
  --err:#ff4f5a;--ok:#2ed573;
  --r:10px;--r2:14px;--nav:64px;
}
html{background:var(--bg)}
body{
  background:var(--bg);color:var(--t);
  font-family:'Barlow',-apple-system,sans-serif;font-size:16px;
  min-height:100svh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}
.hidden{display:none!important}
#app{max-width:480px;margin:0 auto;min-height:100svh;position:relative}
.view{min-height:100svh}

/* ── Auth ── */
#v-auth{display:flex;align-items:center;justify-content:center;min-height:100svh;padding:24px 20px}
.auth-inner{width:100%;max-width:380px}
.auth-brand{margin-bottom:36px}
.auth-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:80px;line-height:.9;color:var(--a);letter-spacing:2px;display:block}
.auth-tagline{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ts);margin-top:6px}
.auth-tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:3px;margin-bottom:24px;border:1px solid var(--bd)}
.auth-tab{flex:1;padding:9px;text-align:center;background:none;border:none;color:var(--ts);font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--s3);color:var(--t)}

/* ── Form fields ── */
.field{margin-bottom:16px}
.field label{display:block;margin-bottom:6px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ts)}
.input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--t);font-size:16px;padding:12px 14px;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.input:focus{outline:none;border-color:var(--a)}
.input::placeholder{color:var(--td)}
select.input{cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:14px;text-align:center;background:var(--a);color:#000;border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98);opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ts);border:1px solid var(--bd2);font-size:15px;font-family:'Barlow',sans-serif;font-weight:600}
.btn-ghost:active{background:var(--s2)}
.btn-sm{display:inline-flex;align-items:center;justify-content:center;width:auto;padding:8px 16px;font-size:13px;font-family:'Barlow',sans-serif;font-weight:600;border-radius:8px;white-space:nowrap}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;background:var(--bg)}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;color:var(--a);letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:10px}
.header-user{font-size:13px;color:var(--ts);font-weight:500;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-out{background:none;border:1px solid var(--bd);color:var(--ts);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.header-out:active{background:var(--s2)}

/* ── Layout ── */
.main-wrap{min-height:100svh;display:flex;flex-direction:column}
.tab-pane{flex:1;overflow-y:auto;padding:20px 20px calc(var(--nav) + 24px)}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav);display:flex;align-items:center;background:var(--s1);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--td);font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:color .15s}
.nav-btn.active{color:var(--a)}
.nav-btn svg{width:20px;height:20px;flex-shrink:0}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;height:100%;background:none;border:none;cursor:pointer;padding:0}
.nav-circle{width:48px;height:48px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s}
.nav-circle:active{transform:scale(.92)}
.nav-circle svg{width:24px;height:24px;color:#000}

/* ── Stats cards ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 14px}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:48px;line-height:1;color:var(--t);font-variant-numeric:tabular-nums}
.stat-num.accent{color:var(--a)}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ts);margin-top:5px}
.stat-wide{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.stat-wide-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ts);margin-bottom:6px}
.stat-wide-val{font-size:18px;font-weight:500}
.stat-big{display:flex;align-items:baseline;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:38px}
.stat-unit{font-size:14px;color:var(--ts);font-family:'Barlow',sans-serif;font-weight:400}

/* ── Section ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:20px}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--ts)}

/* ── Workout item ── */
.wo-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.wo-dot{width:6px;height:6px;border-radius:50%;background:var(--a);flex-shrink:0}
.wo-name{font-weight:500;font-size:15px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo-meta{font-size:13px;color:var(--ts)}
.wo-date{font-size:12px;color:var(--td);white-space:nowrap;flex-shrink:0}

/* ── Exercise entry ── */
.ex-entry{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:12px;position:relative}
.ex-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--a);margin-bottom:12px}
.ex-del{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--td);font-size:20px;line-height:1;cursor:pointer;padding:2px 6px;transition:color .15s}
.ex-del:active{color:var(--err)}

/* ── Day group ── */
.day-group{margin-bottom:24px}
.day-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ts);padding-bottom:10px;border-bottom:1px solid var(--bd)}

/* ── Filter card ── */
.filter-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:16px}

/* ── Skeleton ── */
.skel{background:linear-gradient(90deg,var(--s2) 0%,var(--s3) 50%,var(--s2) 100%);background-size:200% 100%;border-radius:6px;animation:shimmer 1.4s ease-in-out infinite}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(var(--nav) + 12px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--s3);border:1px solid var(--bd2);color:var(--t);padding:10px 20px;border-radius:100px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:calc(100vw - 40px);text-align:center;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--err);color:var(--err)}
#toast.ok{border-color:var(--ok);color:var(--ok)}

/* ── Loader ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
#loader.fade{opacity:0;pointer-events:none}
.loader-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:64px;color:var(--a);letter-spacing:2px;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Progress tab ── */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:100px;background:var(--s2);border:1px solid var(--bd);color:var(--ts);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.active{background:var(--a);border-color:var(--a);color:#000}
.chart-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:14px;overflow:hidden}
.chart-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ts);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.metric-tabs{display:flex;gap:0;background:var(--s3);border-radius:8px;padding:3px;margin-bottom:16px}
.metric-tab{flex:1;text-align:center;padding:7px 4px;border-radius:6px;font-size:12px;font-weight:600;color:var(--ts);cursor:pointer;background:none;border:none;transition:all .15s}
.metric-tab.active{background:var(--s2);color:var(--t)}
.prog-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.prog-kpi{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 10px;text-align:center}
.prog-kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;color:var(--a);display:block;margin-bottom:3px;line-height:1}
.prog-kpi-lbl{font-size:9px;color:var(--ts);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.no-data{text-align:center;padding:36px 0;font-size:14px;color:var(--ts);line-height:2}

/* ── Settings tab ── */
.settings-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:14px;overflow:hidden}
.settings-hd{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.settings-hd-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ts)}
.profile-row{display:flex;align-items:center;gap:14px;padding:18px 16px}
.avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#000;flex-shrink:0}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:18px;font-weight:600;margin-bottom:2px}
.profile-meta{font-size:12px;color:var(--ts)}
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;background:var(--s3);color:var(--ts);border:1px solid var(--bd)}
.badge.bp{background:rgba(136,136,160,.12);color:var(--ts);border-color:rgba(136,136,160,.2)}
.badge.custom{background:rgba(200,255,60,.1);color:var(--a);border-color:rgba(200,255,60,.2)}
.ex-mgmt-item{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--bd)}
.ex-mgmt-item:last-child{border-bottom:none}
.ex-mgmt-name{flex:1;font-size:14px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 8px;color:var(--ts);cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.icon-btn:active{background:var(--s3)}
.icon-btn.del{border-color:rgba(255,79,90,.3);color:var(--err)}
.icon-btn.del:active{background:rgba(255,79,90,.12)}
.add-ex-form-wrap{background:var(--s3);border-top:1px solid var(--bd);padding:14px}
.bp-sel{background:var(--s2);border:1px solid var(--bd);color:var(--t);font-size:12px;border-radius:6px;padding:4px 8px;cursor:pointer;-webkit-appearance:none;appearance:none;max-width:110px}
.search-wrap{position:relative}
.search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ts);pointer-events:none}
.sinput{padding-left:36px!important}
</style>
</head>
<body>

<div id="loader"><div class="loader-logo">LIFT</div></div>
<div id="toast"></div>

<div id="app">

<!-- ═══ AUTH ═══ -->
<div id="v-auth" class="view hidden">
  <div class="auth-inner">
    <div class="auth-brand">
      <span class="auth-logo">LIFT</span>
      <div class="auth-tagline">Workout Tracker</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="setAuthTab('login')">เข้าสู่ระบบ</button>
      <button class="auth-tab" id="tab-reg" onclick="setAuthTab('reg')">สมัครสมาชิก</button>
    </div>
    <form id="form-login" onsubmit="doLogin(event)">
      <div class="field"><label>ชื่อผู้ใช้</label><input id="l-user" class="input" type="text" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="username"></div>
      <div class="field" style="margin-bottom:24px"><label>รหัสผ่าน</label><input id="l-pass" class="input" type="password" autocomplete="current-password" placeholder="••••••"></div>
      <button id="btn-login" class="btn" type="submit">เข้าสู่ระบบ</button>
    </form>
    <form id="form-reg" class="hidden" onsubmit="doRegister(event)">
      <div class="field"><label>ชื่อที่แสดง</label><input id="r-name" class="input" type="text" autocapitalize="words" placeholder="ชื่อของคุณ"></div>
      <div class="field"><label>ชื่อผู้ใช้</label><input id="r-user" class="input" type="text" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="username (ภาษาอังกฤษ)"></div>
      <div class="field"><label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label><input id="r-pass" class="input" type="password" autocomplete="new-password" placeholder="••••••"></div>
      <div class="field" style="margin-bottom:24px"><label>ยืนยันรหัสผ่าน</label><input id="r-cfm" class="input" type="password" autocomplete="new-password" placeholder="••••••"></div>
      <button id="btn-reg" class="btn" type="submit">สมัครสมาชิก</button>
    </form>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="v-main" class="view hidden">
  <header class="header">
    <div class="header-logo">LIFT</div>
    <div class="header-right">
      <span class="header-user" id="u-name"></span>
      <button class="header-out" onclick="doLogout()">ออก</button>
    </div>
  </header>

  <!-- ── Dashboard ── -->
  <div id="tab-dash" class="tab-pane">
    <div id="stats-wrap"></div>
    <div class="sec-head" style="margin-top:8px"><div class="sec-title">ล่าสุด</div></div>
    <div id="recent-list"></div>
  </div>

  <!-- ── Progress ── -->
  <div id="tab-prog" class="tab-pane hidden">
    <div class="sec-head" style="margin-top:0"><div class="sec-title">ความก้าวหน้า</div></div>

    <!-- Period chips -->
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ts);margin-bottom:8px">ช่วงเวลา</div>
      <div class="chip-row" id="period-chips">
        <button class="chip active" data-period="30" onclick="setProgPeriod('30')">30 วัน</button>
        <button class="chip" data-period="90" onclick="setProgPeriod('90')">90 วัน</button>
        <button class="chip" data-period="180" onclick="setProgPeriod('180')">6 เดือน</button>
        <button class="chip" data-period="all" onclick="setProgPeriod('all')">ทั้งหมด</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-card" style="margin-bottom:14px">
      <div class="row2" style="margin-bottom:10px">
        <div class="field" style="margin-bottom:0">
          <label>Body Part</label>
          <select id="prog-bp" class="input" onchange="onProgBPChange()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>ท่าออกกำลังกาย</label>
          <select id="prog-ex" class="input" onchange="onProgExChange()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
      </div>
      <!-- Metric tabs -->
      <div class="metric-tabs" id="metric-tabs">
        <button class="metric-tab active" data-metric="weight" onclick="setProgMetric('weight')">น้ำหนัก (kg)</button>
        <button class="metric-tab" data-metric="volume" onclick="setProgMetric('volume')">Volume</button>
        <button class="metric-tab" data-metric="reps" onclick="setProgMetric('reps')">Reps</button>
      </div>
    </div>

    <!-- KPI row -->
    <div class="prog-kpi-row" id="prog-kpi"></div>

    <!-- Chart -->
    <div class="chart-card" id="prog-chart-wrap">
      <div class="chart-label" id="prog-chart-label">กราฟ</div>
      <div id="prog-chart"></div>
    </div>
  </div>

  <!-- ── Log ── -->
  <div id="tab-log" class="tab-pane hidden">
    <div class="sec-head" style="margin-top:0"><div class="sec-title">บันทึก Workout</div></div>
    <div class="field" style="margin-bottom:20px">
      <label>วันที่</label>
      <input id="log-date" class="input" type="date">
    </div>
    <div id="log-items"></div>
    <button onclick="addEntry()" class="btn btn-ghost" style="margin-bottom:14px">+ เพิ่มท่า</button>
    <button id="btn-save" onclick="saveWorkout()" class="btn">บันทึก Workout</button>
  </div>

  <!-- ── History ── -->
  <div id="tab-hist" class="tab-pane hidden">
    <div class="filter-card">
      <div class="sec-title" style="margin-bottom:12px">กรอง</div>
      <div class="row2" style="margin-bottom:10px">
        <div class="field" style="margin-bottom:0"><label>จากวันที่</label><input id="f-from" class="input" type="date" onchange="applyHistFilter()"></div>
        <div class="field" style="margin-bottom:0"><label>ถึงวันที่</label><input id="f-to" class="input" type="date" onchange="applyHistFilter()"></div>
      </div>
      <div class="row2">
        <div class="field" style="margin-bottom:0">
          <label>Body Part</label>
          <select id="f-bp" class="input" onchange="onHistBPChange()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>ท่าออกกำลังกาย</label>
          <select id="f-ex" class="input" onchange="applyHistFilter()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
      </div>
    </div>
    <div id="hist-list"></div>
  </div>

  <!-- ── Settings ── -->
  <div id="tab-settings" class="tab-pane hidden">
    <div class="sec-head" style="margin-top:0"><div class="sec-title">ตั้งค่า</div></div>

    <!-- Profile card -->
    <div class="settings-card">
      <div class="settings-hd">
        <div class="settings-hd-title">โปรไฟล์</div>
        <button class="btn btn-ghost btn-sm" id="btn-edit-profile" onclick="toggleEditProfile()">แก้ไข</button>
      </div>
      <div class="profile-row" id="profile-view">
        <div class="avatar" id="profile-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="profile-name-display">—</div>
          <div class="profile-meta" id="profile-username-display"></div>
        </div>
      </div>
      <!-- Edit form (hidden by default) -->
      <div id="profile-edit-form" class="hidden" style="padding:0 16px 16px">

<script>
// ════════════════════════════════════════
//  ⚙️  แก้ URL นี้หลัง Deploy Apps Script
// ════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxe8iwgIu0KQzMc6iPybcWMxSKFIomY27X2U7UgkiW1Ce1hwzmYTjR16GXrsoVTjbKbng/exec';
// ════════════════════════════════════════

const BODY_PARTS = ['อก','หลัง','ไหล่','แขน','ขา','Core','Cardio','Full Body','อื่นๆ'];

// ── State ─────────────────────────────────
const S = {
  token: localStorage.getItem('lt'),
  user:  JSON.parse(localStorage.getItem('lu') || 'null'),
  exercises: [],
  exOpts: '',
  tab: 'dash',
  histFilters: {},
  progFilters: { period: '30', bodyPart: '', exercise: '', metric: 'weight' },
};

// ── LocalStorage helpers ──────────────────
function getBPMap()           { return JSON.parse(localStorage.getItem('lt_bp')  || '{}'); }
function saveBPMap(m)         { localStorage.setItem('lt_bp',  JSON.stringify(m)); }
function getCustomEx()        { return JSON.parse(localStorage.getItem('lt_cex') || '[]'); }
function saveCustomEx(a)      { localStorage.setItem('lt_cex', JSON.stringify(a)); }

function getAllExercises() {
  const custom = getCustomEx();
  const names  = new Set(S.exercises.map(e => e.name));
  return [...S.exercises, ...custom.filter(e => !names.has(e.name))];
}
function getExBP(name) {
  const m = getBPMap();
  if (m[name]) return m[name];
  const ex = S.exercises.find(e => e.name === name);
  if (ex) return ex.category || 'อื่นๆ';
  const ce = getCustomEx().find(e => e.name === name);
  return ce ? (ce.category || 'อื่นๆ') : 'อื่นๆ';
}
function getDistinctBPs() {
  const all  = getAllExercises();
  const bpM  = getBPMap();
  const bps  = new Set(all.map(e => bpM[e.name] || e.category || 'อื่นๆ'));
  return [...bps].filter(Boolean).sort();
}

// ── API ───────────────────────────────────
async function api(action, data = {}) {
  try {
    const body = { action, ...data };
    if (S.token) body.token = S.token;
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
    });
    const json = await r.json();
    if (json.code === 401) doLogout();
    return json;
  } catch {
    return { success: false, message: 'เชื่อมต่อไม่ได้ ลองใหม่อีกครั้ง' };
  }
}

// ── Toast ─────────────────────────────────
let _tt;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type === 'err' ? 'err' : type === 'ok' ? 'ok' : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.className = '', 3200);
}

// ── Init ──────────────────────────────────
async function init() {
  if (SCRIPT_URL.includes('YOUR_DEPLOYMENT_ID')) {
    document.getElementById('loader').innerHTML =
      '<div style="padding:30px;text-align:center;max-width:320px">' +
      '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:40px;color:var(--a);margin-bottom:20px">LIFT</div>' +
      '<div style="color:var(--err);font-weight:600;margin-bottom:10px">⚠️ ยังไม่ได้ตั้งค่า</div>' +
      '<div style="color:var(--ts);font-size:14px;line-height:1.7">แก้ <code style="color:var(--t);background:var(--s2);padding:2px 6px;border-radius:4px">SCRIPT_URL</code> ให้เป็น URL ของ Apps Script</div></div>';
    return;
  }
  if (S.token && S.user) await showMain();
  else { hideSplash(); showAuth(); }
}

function hideSplash() {
  const l = document.getElementById('loader');
  l.classList.add('fade');
  setTimeout(() => l.style.display = 'none', 300);
}

// ── Auth ──────────────────────────────────
function showAuth() {
  document.getElementById('v-auth').classList.remove('hidden');
  document.getElementById('v-main').classList.add('hidden');
}
function setAuthTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t === 'login');
  document.getElementById('tab-reg').classList.toggle('active', t === 'reg');
  document.getElementById('form-login').classList.toggle('hidden', t !== 'login');
  document.getElementById('form-reg').classList.toggle('hidden', t !== 'reg');
}
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!username || !password) return toast('กรอกข้อมูลให้ครบ', 'err');
  btn.disabled = true; btn.textContent = 'กำลังเข้า...';
  const r = await api('login', { username, password });
  btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
  if (r.success) {
    S.token = r.data.token;
    S.user  = { displayName: r.data.displayName, username };
    localStorage.setItem('lt', S.token);
    localStorage.setItem('lu', JSON.stringify(S.user));
    await showMain();
  } else toast(r.message || 'เข้าสู่ระบบไม่สำเร็จ', 'err');
}
async function doRegister(e) {
  e.preventDefault();
  const username    = document.getElementById('r-user').value.trim();
  const password    = document.getElementById('r-pass').value;
  const confirm     = document.getElementById('r-cfm').value;
  const displayName = document.getElementById('r-name').value.trim();
  if (!username || !password) return toast('กรอกข้อมูลให้ครบ', 'err');
  if (password !== confirm) return toast('รหัสผ่านไม่ตรงกัน', 'err');
  const btn = document.getElementById('btn-reg');
  btn.disabled = true; btn.textContent = 'กำลังสมัคร...';
  const r = await api('register', { username, password, displayName });
  btn.disabled = false; btn.textContent = 'สมัครสมาชิก';
  if (r.success) { toast('สมัครสำเร็จ เข้าสู่ระบบได้เลย', 'ok'); setAuthTab('login'); document.getElementById('l-user').value = username; document.getElementById('l-pass').focus(); }
  else toast(r.message || 'สมัครไม่สำเร็จ', 'err');
}
function doLogout() {
  S.token = null; S.user = null; S.exercises = []; S.exOpts = '';
  localStorage.removeItem('lt'); localStorage.removeItem('lu');
  showAuth();
}

// ── Main ──────────────────────────────────
async function showMain() {
  document.getElementById('v-auth').classList.add('hidden');
  document.getElementById('v-main').classList.remove('hidden');
  document.getElementById('u-name').textContent = S.user?.displayName || '';
  hideSplash();
  await loadExercises();
  setTab('dash');
}

// ── Tab routing ───────────────────────────
const ALL_TABS = ['dash','prog','log','hist','settings'];
function setTab(tab) {
  S.tab = tab;
  ALL_TABS.forEach(t => document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab));
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (tab === 'dash')     loadDash();
  if (tab === 'prog')     loadProg();
  if (tab === 'log')      initLog();
  if (tab === 'hist')     { populateHistFilters(); loadHist(); }
  if (tab === 'settings') loadSettings();
}

// ── Dashboard ─────────────────────────────
async function loadDash() {
  document.getElementById('stats-wrap').innerHTML   = skelStats();
  document.getElementById('recent-list').innerHTML  = skelRecent(4);
  const [sr, wr] = await Promise.all([api('getStats'), api('getWorkouts', { filters: {} })]);
  if (sr.success) renderStats(sr.data);
  if (wr.success) renderRecent(wr.data.slice(0, 10));
}

function skelStats() {
  return `<div class="stats-grid">
    <div class="stat-card"><div class="skel" style="height:48px;width:64px;margin-bottom:8px"></div><div class="skel" style="height:10px;width:80px"></div></div>
    <div class="stat-card"><div class="skel" style="height:48px;width:64px;margin-bottom:8px"></div><div class="skel" style="height:10px;width:80px"></div></div>
  </div>
  <div class="stat-wide"><div class="skel" style="height:10px;width:80px;margin-bottom:8px"></div><div class="skel" style="height:20px;width:140px"></div></div>
  <div class="stat-wide"><div class="skel" style="height:10px;width:80px;margin-bottom:8px"></div><div class="skel" style="height:36px;width:120px"></div></div>`;
}
function skelRecent(n) {
  return Array(n).fill(0).map(() => `<div class="wo-item">
    <div class="skel" style="width:6px;height:6px;border-radius:50%;flex-shrink:0"></div>
    <div style="flex:1;min-width:0"><div class="skel" style="height:15px;width:110px;margin-bottom:5px"></div><div class="skel" style="height:12px;width:80px"></div></div>
  </div>`).join('');
}
function renderStats(d) {
  document.getElementById('stats-wrap').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num accent">${d.weekSessions}</div><div class="stat-lbl">สัปดาห์นี้</div></div>
      <div class="stat-card"><div class="stat-num">${d.totalSessions}</div><div class="stat-lbl">ทั้งหมด (ครั้ง)</div></div>
    </div>
    <div class="stat-wide"><div class="stat-wide-lbl">ท่าที่ชอบ</div><div class="stat-wide-val">${esc(d.favoriteExercise)}</div></div>
    <div class="stat-wide"><div class="stat-wide-lbl">น้ำหนักรวมที่ยก</div><div class="stat-big"><span>${d.totalWeight.toLocaleString()}</span><span class="stat-unit">kg</span></div></div>`;
}
function renderRecent(list) {
  const el = document.getElementById('recent-list');
  if (!list.length) { el.innerHTML = '<p style="color:var(--ts);text-align:center;padding:32px 0;font-size:14px">ยังไม่มีข้อมูล<br>กด <strong style="color:var(--a)">+</strong> เพื่อเริ่มบันทึก</p>'; return; }
  el.innerHTML = list.map(w => `
    <div class="wo-item">
      <div class="wo-dot"></div>
      <div style="flex:1;min-width:0">
        <div class="wo-name">${esc(w.exerciseName)}</div>
        <div class="wo-meta">${metaStr(w)}</div>
      </div>
      <div class="wo-date">${relDate(w.date)}</div>
    </div>`).join('');
}

// ── Progress ──────────────────────────────
async function loadProg() {
  populateProgFilters();
  await renderProgContent();
}

function setProgPeriod(p) {
  S.progFilters.period = p;
  document.querySelectorAll('#period-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.period === p));
  renderProgContent();
}
function setProgMetric(m) {
  S.progFilters.metric = m;
  document.querySelectorAll('#metric-tabs .metric-tab').forEach(c => c.classList.toggle('active', c.dataset.metric === m));
  renderProgContent();
}
function onProgBPChange() {
  S.progFilters.bodyPart = document.getElementById('prog-bp').value;
  S.progFilters.exercise = '';
  populateProgExSelect();
  renderProgContent();
}
function onProgExChange() {
  S.progFilters.exercise = document.getElementById('prog-ex').value;
  renderProgContent();
}

function populateProgFilters() {
  // Body part select
  const bpSel = document.getElementById('prog-bp');
  const curBP = bpSel.value;
  bpSel.innerHTML = `<option value="">ทั้งหมด</option>` + getDistinctBPs().map(b => `<option value="${esc(b)}" ${b === curBP ? 'selected' : ''}>${esc(b)}</option>`).join('');
  populateProgExSelect();
  // Restore metric tab
  document.querySelectorAll('#metric-tabs .metric-tab').forEach(c => c.classList.toggle('active', c.dataset.metric === S.progFilters.metric));
}

function populateProgExSelect() {
  const sel = document.getElementById('prog-ex');
  const bp  = S.progFilters.bodyPart;
  const all = getAllExercises();
  const filtered = bp ? all.filter(e => getExBP(e.name) === bp) : all;
  sel.innerHTML = `<option value="">ทั้งหมด</option>` + filtered.map(e => `<option value="${esc(e.name)}" ${e.name === S.progFilters.exercise ? 'selected' : ''}>${esc(e.name)}</option>`).join('');
}

function getPeriodDates() {
  const p = S.progFilters.period;
  if (p === 'all') return { from: '', to: '' };
  const to   = new Date();
  const from = new Date();
  from.setDate(to.getDate() - parseInt(p));
  return { from: from.toISOString().slice(0, 10), to: to.toISOString().slice(0, 10) };
}

async function renderProgContent() {
  // Show skeleton
  document.getElementById('prog-kpi').innerHTML = `
    <div class="prog-kpi"><div class="skel" style="height:24px;width:50px;margin:0 auto 6px"></div><div class="skel" style="height:9px;width:40px;margin:0 auto"></div></div>
    <div class="prog-kpi"><div class="skel" style="height:24px;width:50px;margin:0 auto 6px"></div><div class="skel" style="height:9px;width:40px;margin:0 auto"></div></div>
    <div class="prog-kpi"><div class="skel" style="height:24px;width:50px;margin:0 auto 6px"></div><div class="skel" style="height:9px;width:40px;margin:0 auto"></div></div>`;
  document.getElementById('prog-chart').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:120px"><div class="skel" style="width:80%;height:80px"></div></div>`;

  const { from, to } = getPeriodDates();
  const apiFilters = { from, to };
  if (S.progFilters.exercise) apiFilters.exercise = S.progFilters.exercise;

  const r = await api('getWorkouts', { filters: apiFilters });
  if (!r.success) {
    document.getElementById('prog-chart').innerHTML = `<div class="no-data">${esc(r.message)}</div>`;
    document.getElementById('prog-kpi').innerHTML = '';
    return;
  }

  let workouts = r.data || [];

  // Filter by body part client-side if needed
  if (S.progFilters.bodyPart && !S.progFilters.exercise) {
    workouts = workouts.filter(w => getExBP(w.exerciseName) === S.progFilters.bodyPart);
  }

  const exName   = S.progFilters.exercise;
  const metric   = S.progFilters.metric;
  const bp       = S.progFilters.bodyPart;

  if (exName) {
    // Line chart: single exercise over time
    const data   = buildLineData(workouts, metric);
    const kpis   = calcKPIs(workouts, metric);
    renderKPIs(kpis, metric);
    const label  = `${esc(exName)} — ${metricLabel(metric)}`;
    document.getElementById('prog-chart-label').textContent = label;
    document.getElementById('prog-chart').innerHTML = data.length
      ? svgLineChart(data)
      : `<div class="no-data">ยังไม่มีข้อมูลในช่วงนี้</div>`;
  } else if (bp) {
    // Bar chart: top exercises in body part
    const grouped = {};
    workouts.forEach(w => { grouped[w.exerciseName] = (grouped[w.exerciseName] || 0) + 1; });
    const barData = Object.entries(grouped).sort((a, b) => b[1] - a[1]).slice(0, 8)
      .map(([label, value]) => ({ label, value }));
    renderKPIsOverview(workouts);
    document.getElementById('prog-chart-label').textContent = `${esc(bp)} — ครั้งที่ฝึก`;
    document.getElementById('prog-chart').innerHTML = barData.length
      ? svgBarChart(barData)
      : `<div class="no-data">ยังไม่มีข้อมูลในช่วงนี้</div>`;
  } else {
    // Bar chart: sessions per body part
    const grouped = {};
    workouts.forEach(w => { const b = getExBP(w.exerciseName); grouped[b] = (grouped[b] || 0) + 1; });
    const barData = Object.entries(grouped).sort((a, b) => b[1] - a[1])
      .map(([label, value]) => ({ label, value }));
    renderKPIsOverview(workouts);
    document.getElementById('prog-chart-label').textContent = 'ครั้งที่ฝึกแต่ละ Body Part';
    document.getElementById('prog-chart').innerHTML = barData.length
      ? svgBarChart(barData)
      : `<div class="no-data">ยังไม่มีข้อมูล<br>เริ่มบันทึก Workout เพื่อดูสถิติ</div>`;
  }
}

function buildLineData(workouts, metric) {
  const grouped = {};
  workouts.forEach(w => {
    if (!grouped[w.date]) grouped[w.date] = [];
    grouped[w.date].push(w);
  });
  return Object.entries(grouped)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, ws]) => {
      let v = 0;
      if (metric === 'weight') v = Math.max(...ws.map(w => Number(w.weight) || 0));
      if (metric === 'volume') v = ws.reduce((s, w) => s + (Number(w.sets)||0)*(Number(w.reps)||0)*(Number(w.weight)||0), 0);
      if (metric === 'reps')   v = Math.max(...ws.map(w => Number(w.reps) || 0));
      return { date, v };
    }).filter(d => d.v > 0);
}

function calcKPIs(workouts, metric) {
  if (!workouts.length) return { pr: 0, sessions: 0, avg: 0 };
  const sessions = [...new Set(workouts.map(w => w.date))].length;
  let pr = 0, total = 0, cnt = 0;
  workouts.forEach(w => {
    let v = 0;
    if (metric === 'weight') v = Number(w.weight) || 0;
    if (metric === 'volume') v = (Number(w.sets)||0)*(Number(w.reps)||0)*(Number(w.weight)||0);
    if (metric === 'reps')   v = Number(w.reps) || 0;
    if (v > pr) pr = v;
    total += v; cnt++;
  });
  return { pr, sessions, avg: cnt ? (total / cnt) : 0 };
}
function renderKPIs({ pr, sessions, avg }, metric) {
  const unit = metric === 'weight' ? ' kg' : metric === 'reps' ? ' reps' : '';
  document.getElementById('prog-kpi').innerHTML = `
    <div class="prog-kpi"><span class="prog-kpi-val">${fmt(pr)}${unit}</span><div class="prog-kpi-lbl">PR</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${sessions}</span><div class="prog-kpi-lbl">Sessions</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${fmt(avg)}${unit}</span><div class="prog-kpi-lbl">เฉลี่ย</div></div>`;
}
function renderKPIsOverview(workouts) {
  const sessions = [...new Set(workouts.map(w => w.date))].length;
  const exCount  = [...new Set(workouts.map(w => w.exerciseName))].length;
  const vol      = workouts.reduce((s, w) => s + (Number(w.sets)||0)*(Number(w.reps)||0)*(Number(w.weight)||0), 0);
  document.getElementById('prog-kpi').innerHTML = `
    <div class="prog-kpi"><span class="prog-kpi-val">${sessions}</span><div class="prog-kpi-lbl">Sessions</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${exCount}</span><div class="prog-kpi-lbl">ท่าที่ฝึก</div></div>
    <div class="prog-kpi"><span class="prog-kpi-val">${vol >= 1000 ? (vol/1000).toFixed(1)+'k' : vol}</span><div class="prog-kpi-lbl">Volume</div></div>`;
}
function fmt(n) { return Number.isFinite(n) ? (Math.round(n * 10) / 10) : 0; }
function metricLabel(m) { return m === 'weight' ? 'น้ำหนัก (kg)' : m === 'volume' ? 'Volume' : 'Reps'; }

// ── SVG Charts ────────────────────────────
function svgLineChart(data) {
  const W = 360, H = 170, PL = 44, PR = 12, PT = 12, PB = 32;
  const cW = W - PL - PR, cH = H - PT - PB;
  const vals = data.map(d => d.v);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const vR   = maxV - minV || 1;
  const xs   = i => PL + (i / Math.max(data.length - 1, 1)) * cW;
  const ys   = v => PT + cH - ((v - minV) / vR) * cH;

  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  // Y grid
  const yLines = [0, 0.33, 0.67, 1].map(t => {
    const v = minV + vR * t, y = ys(v).toFixed(1);
    return `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
            <text x="${PL - 5}" y="${(parseFloat(y) + 4).toFixed(1)}" text-anchor="end" fill="#8888a0" font-size="10" font-family="Barlow,sans-serif">${Math.round(v)}</text>`;
  }).join('');

  // X labels (max 5)
  const step = Math.max(1, Math.ceil(data.length / 5));
  const indices = [...new Set([0, ...data.map((_, i) => i).filter(i => i % step === 0), data.length - 1])];
  const xLabels = indices.map(i => {
    const dt = new Date(data[i].date + 'T00:00:00');
    return `<text x="${xs(i).toFixed(1)}" y="${H - 5}" text-anchor="middle" fill="#8888a0" font-size="10" font-family="Barlow,sans-serif">${dt.getDate()} ${months[dt.getMonth()]}</text>`;
  }).join('');

  const pts    = data.map((d, i) => `${xs(i).toFixed(1)},${ys(d.v).toFixed(1)}`).join(' ');
  const areaPts = `${PL},${(PT + cH).toFixed(1)} ${pts} ${(W - PR).toFixed(1)},${(PT + cH).toFixed(1)}`;
  const dotR   = data.length <= 12 ? 4 : data.length <= 25 ? 3 : 2;
  const dots   = data.map((d, i) => `<circle cx="${xs(i).toFixed(1)}" cy="${ys(d.v).toFixed(1)}" r="${dotR}" fill="#c8ff3c" stroke="#0b0b0e" stroke-width="1.5"/>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    <defs>
      <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c8ff3c" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#c8ff3c" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${yLines}
    <polygon points="${areaPts}" fill="url(#ag)"/>
    <polyline points="${pts}" fill="none" stroke="#c8ff3c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

function svgBarChart(data) {
  if (!data.length) return '<div class="no-data">ไม่มีข้อมูล</div>';
  const maxV  = Math.max(...data.map(d => d.value));
  const rowH  = 32, gap = 6;
  const W     = 360, PL = 70, PR = 36;
  const bW    = W - PL - PR;
  const H     = data.length * (rowH + gap) + 4;
  const bars  = data.map((d, i) => {
    const y  = i * (rowH + gap) + 4;
    const bw = (d.value / maxV) * bW;
    const lbl = d.label.length > 8 ? d.label.slice(0, 8) + '…' : d.label;
    return `
      <text x="${PL - 7}" y="${(y + rowH * 0.65).toFixed(1)}" text-anchor="end" fill="#eeeef2" font-size="13" font-weight="500" font-family="Barlow,sans-serif">${esc(lbl)}</text>
      <rect x="${PL}" y="${y + 6}" width="${bw.toFixed(1)}" height="${rowH - 12}" rx="4" fill="#c8ff3c" opacity="0.85"/>
      <text x="${PL + bw + 6}" y="${(y + rowH * 0.65).toFixed(1)}" fill="#8888a0" font-size="12" font-family="Barlow,sans-serif">${d.value}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${bars}</svg>`;
}

// ── Log Workout ───────────────────────────
function initLog() {
  document.getElementById('log-date').value = todayStr();
  document.getElementById('log-items').innerHTML = '';
  appendEntry();
}
function appendEntry() {
  const container = document.getElementById('log-items');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'ex-entry';
  div.innerHTML = entryHTML(idx + 1, idx > 0);
  container.appendChild(div);
  populateSelect(div.querySelector('.ex-select'));
  if (idx > 0) div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function addEntry() { appendEntry(); }
function delEntry(btn) {
  btn.closest('.ex-entry').remove();
  document.querySelectorAll('.ex-num').forEach((el, i) => { el.textContent = 'EXERCISE ' + (i + 1); });
}
function entryHTML(num, canDel) {
  return `
    <div class="ex-num">EXERCISE ${num}</div>
    ${canDel ? `<button type="button" class="ex-del" onclick="delEntry(this)">×</button>` : ''}
    <div class="field">
      <label>ท่าออกกำลังกาย</label>
      <select class="input ex-select" onchange="onExSel(this)"><option value="">— เลือกท่า —</option></select>
      <input type="text" class="input custom-ex" style="display:none;margin-top:8px" placeholder="พิมพ์ชื่อท่า...">
    </div>
    <div class="row2">
      <div class="field"><label>Sets</label><input class="input" type="number" name="sets" min="1" value="3" inputmode="numeric"></div>
      <div class="field"><label>Reps</label><input class="input" type="number" name="reps" min="1" value="10" inputmode="numeric"></div>
    </div>
    <div class="row2">
      <div class="field"><label>น้ำหนัก (kg)</label><input class="input" type="number" name="weight" min="0" step="0.5" inputmode="decimal" placeholder="0"></div>
      <div class="field"><label>เวลา (นาที)</label><input class="input" type="number" name="duration" min="0" inputmode="numeric" placeholder="—"></div>
    </div>
    <div class="field" style="margin-bottom:0"><label>หมายเหตุ</label><input class="input" type="text" name="notes" placeholder="—"></div>`;
}
function onExSel(sel) {
  const cust   = sel.closest('.ex-entry').querySelector('.custom-ex');
  const isCust = sel.value === '__custom';
  cust.style.display = isCust ? 'block' : 'none';
  if (isCust) cust.focus();
}
function populateSelect(sel) {
  if (!sel) return;
  const v = sel.value;
  sel.innerHTML = `<option value="">— เลือกท่า —</option>${S.exOpts}<option value="__custom">อื่นๆ (พิมพ์เอง)</option>`;
  if (v) sel.value = v;
}
async function saveWorkout() {
  const date    = document.getElementById('log-date').value;
  if (!date) return toast('กรุณาเลือกวันที่', 'err');
  const entries = [...document.querySelectorAll('.ex-entry')];
  const workouts = [];
  for (let i = 0; i < entries.length; i++) {
    const entry  = entries[i];
    const sel    = entry.querySelector('.ex-select');
    const cust   = entry.querySelector('.custom-ex');
    const exName = sel.value === '__custom' ? cust.value.trim() : sel.value;
    if (!exName) return toast(`กรุณาเลือกท่าข้อ ${i + 1}`, 'err');
    workouts.push({
      date, exerciseName: exName,
      sets:     entry.querySelector('[name=sets]').value     || 0,
      reps:     entry.querySelector('[name=reps]').value     || 0,
      weight:   entry.querySelector('[name=weight]').value   || 0,
      duration: entry.querySelector('[name=duration]').value || 0,
      notes:    entry.querySelector('[name=notes]').value    || '',
    });
  }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  const r = await api('addWorkouts', { workouts });
  btn.disabled = false; btn.textContent = 'บันทึก Workout';
  if (r.success) { toast('บันทึกสำเร็จ 💪', 'ok'); initLog(); }
  else toast(r.message || 'บันทึกไม่สำเร็จ', 'err');
}

// ── Exercises ─────────────────────────────
async function loadExercises() {
  const r = await api('getExercises');
  if (!r.success) return;
  S.exercises = r.data;

  const bpMap   = getBPMap();
  const customEx = getCustomEx();

  // Merge custom
  const allEx = getAllExercises();

  // Build optgroups
  const groups = allEx.reduce((g, e) => {
    const bp = bpMap[e.name] || e.category || 'อื่นๆ';
    (g[bp] = g[bp] || []).push(e);
    return g;
  }, {});
  S.exOpts = Object.entries(groups)
    .map(([cat, exs]) =>
      `<optgroup label="${esc(cat)}">${exs.map(e => `<option value="${esc(e.name)}">${esc(e.name)}</option>`).join('')}</optgroup>`)
    .join('');

  document.querySelectorAll('.ex-select').forEach(populateSelect);
}

// ── History ───────────────────────────────
function populateHistFilters() {
  const bpSel = document.getElementById('f-bp');
  const curBP = bpSel.value;
  bpSel.innerHTML = `<option value="">ทั้งหมด</option>` + getDistinctBPs().map(b => `<option value="${esc(b)}" ${b === curBP ? 'selected' : ''}>${esc(b)}</option>`).join('');
  updateHistExSelect(curBP);
}
function onHistBPChange() {
  const bp = document.getElementById('f-bp').value;
  updateHistExSelect(bp);
  applyHistFilter();
}
function updateHistExSelect(bp) {
  const sel = document.getElementById('f-ex');
  const cur = sel.value;
  const all = getAllExercises();
  const filtered = bp ? all.filter(e => getExBP(e.name) === bp) : all;
  sel.innerHTML = `<option value="">ทั้งหมด</option>` + filtered.map(e => `<option value="${esc(e.name)}" ${e.name === cur ? 'selected' : ''}>${esc(e.name)}</option>`).join('');
}
async function loadHist() {
  document.getElementById('hist-list').innerHTML = skelRecent(5);
  const bp = document.getElementById('f-bp')?.value || '';
  const apiFilters = {
    from: document.getElementById('f-from').value,
    to:   document.getElementById('f-to').value,
    exercise: bp ? '' : (document.getElementById('f-ex').value || ''),
  };
  const r = await api('getWorkouts', { filters: apiFilters });
  if (r.success) {
    let data = r.data;
    if (bp) data = data.filter(w => getExBP(w.exerciseName) === bp);
    const ex2 = document.getElementById('f-ex').value;
    if (bp && ex2) data = data.filter(w => w.exerciseName === ex2);
    renderHist(data);
  } else {
    document.getElementById('hist-list').innerHTML = `<p style="color:var(--ts);text-align:center;padding:32px 0;font-size:14px">${esc(r.message)}</p>`;
  }
}
function applyHistFilter() { loadHist(); }
function renderHist(list) {
  const el = document.getElementById('hist-list');
  if (!list.length) { el.innerHTML = '<p style="color:var(--ts);text-align:center;padding:40px 0;font-size:14px">ไม่มีข้อมูลในช่วงนี้</p>'; return; }
  const groups = {};
  list.forEach(w => { if (!groups[w.date]) groups[w.date] = []; groups[w.date].push(w); });
  el.innerHTML = Object.entries(groups)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([date, items]) => `
      <div class="day-group">
        <div class="day-lbl">${formatDate(date)}</div>
        ${items.map(w => `
          <div class="wo-item">
            <div class="wo-dot"></div>
            <div style="flex:1;min-width:0">
              <div class="wo-name">${esc(w.exerciseName)}</div>
              <div class="wo-meta">${metaStr(w)}</div>
            </div>
            <span class="badge bp" style="flex-shrink:0">${esc(getExBP(w.exerciseName))}</span>
          </div>`).join('')}
      </div>`).join('');
}

// ── Settings ──────────────────────────────
function loadSettings() {
  const user = S.user || {};
  const name = user.displayName || '—';
  const initial = name.charAt(0).toUpperCase();
  document.getElementById('profile-avatar').textContent  = initial || '?';
  document.getElementById('profile-name-display').textContent = name;
  document.getElementById('profile-username-display').textContent = user.username ? `@${user.username}` : '';
  document.getElementById('edit-display-name').value = user.displayName || '';
  renderExList('');
  populateAddExBPSelect();
}
function populateAddExBPSelect() {
  const sel = document.getElementById('new-ex-bp');
  sel.innerHTML = `<option value="">— เลือก —</option>` + BODY_PARTS.map(b => `<option value="${b}">${b}</option>`).join('');
}
function toggleEditProfile() {
  const form = document.getElementById('profile-edit-form');
  const btn  = document.getElementById('btn-edit-profile');
  const show = form.classList.toggle('hidden');
  btn.textContent = show ? 'แก้ไข' : 'ยกเลิก';
  if (!show) document.getElementById('edit-display-name').focus();
}
async function saveProfile() {
  const newName = document.getElementById('edit-display-name').value.trim();
  const newPass = document.getElementById('edit-password').value;
  if (!newName) return toast('กรุณากรอกชื่อ', 'err');

  // Update locally
  S.user = { ...S.user, displayName: newName };
  localStorage.setItem('lu', JSON.stringify(S.user));
  document.getElementById('u-name').textContent       = newName;
  document.getElementById('profile-name-display').textContent = newName;
  document.getElementById('profile-avatar').textContent = newName.charAt(0).toUpperCase();

  // Try API (silently fail if endpoint doesn't exist)
  const payload = { displayName: newName };
  if (newPass) payload.password = newPass;
  const r = await api('updateProfile', payload);
  if (r.success || r.message?.includes('not found') || r.message?.includes('invalid action')) {
    toast('บันทึกโปรไฟล์สำเร็จ', 'ok');
  } else if (!r.success) {
    toast(r.message || 'บันทึกสำเร็จ (เฉพาะเครื่องนี้)', 'ok');
  }
  document.getElementById('edit-password').value = '';
  toggleEditProfile();
}

function toggleAddExForm() {
  const form = document.getElementById('add-ex-form');
  form.classList.toggle('hidden');
  if (!form.classList.contains('hidden')) document.getElementById('new-ex-name').focus();
}
function addExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  const bp   = document.getElementById('new-ex-bp').value;
  if (!name) return toast('กรุณากรอกชื่อท่า', 'err');
  if (!bp)   return toast('กรุณาเลือก Body Part', 'err');
  const existing = getAllExercises().find(e => e.name.toLowerCase() === name.toLowerCase());
  if (existing) return toast('ท่านี้มีอยู่แล้ว', 'err');
  const custom = getCustomEx();
  custom.push({ name, category: bp });
  saveCustomEx(custom);
  // also set in BP map for consistency
  const bpMap = getBPMap();
  bpMap[name] = bp;
  saveBPMap(bpMap);
  // Reload exercises
  const allEx = getAllExercises();
  const groups = allEx.reduce((g, e) => {
    const b = getExBP(e.name);
    (g[b] = g[b] || []).push(e);
    return g;
  }, {});
  S.exOpts = Object.entries(groups)
    .map(([cat, exs]) => `<optgroup label="${esc(cat)}">${exs.map(e => `<option value="${esc(e.name)}">${esc(e.name)}</option>`).join('')}</optgroup>`)
    .join('');
  document.querySelectorAll('.ex-select').forEach(populateSelect);
  document.getElementById('new-ex-name').value = '';
  document.getElementById('new-ex-bp').value   = '';
  toggleAddExForm();
  renderExList('');
  toast(`เพิ่ม "${name}" สำเร็จ`, 'ok');
}
function deleteEx(name) {
  if (!confirm(`ลบท่า "${name}" ออกจากรายการ?`)) return;
  const custom = getCustomEx().filter(e => e.name !== name);
  saveCustomEx(custom);
  const bpMap = getBPMap();
  delete bpMap[name];
  saveBPMap(bpMap);
  renderExList(document.querySelector('#ex-list').previousElementSibling?.value || '');
  toast('ลบเรียบร้อย', 'ok');
}
function updateExBP(name, bp) {
  const bpMap  = getBPMap();
  bpMap[name]  = bp;
  saveBPMap(bpMap);
  // Update category in custom exercises if it's custom
  const custom = getCustomEx();
  const ci     = custom.findIndex(e => e.name === name);
  if (ci >= 0) { custom[ci].category = bp; saveCustomEx(custom); }
  // Rebuild exOpts
  const allEx  = getAllExercises();
  const groups = allEx.reduce((g, e) => {
    const b = getExBP(e.name);
    (g[b] = g[b] || []).push(e);
    return g;
  }, {});
  S.exOpts = Object.entries(groups)
    .map(([cat, exs]) => `<optgroup label="${esc(cat)}">${exs.map(e => `<option value="${esc(e.name)}">${esc(e.name)}</option>`).join('')}</optgroup>`)
    .join('');
  toast(`อัปเดต "${name}" → ${bp}`, 'ok');
}
function renderExList(query) {
  const q        = (query || '').toLowerCase();
  const bpMap    = getBPMap();
  const customSet = new Set(getCustomEx().map(e => e.name));
  const all      = getAllExercises();
  const filtered = q ? all.filter(e => e.name.toLowerCase().includes(q)) : all;

  const bpOptions = BODY_PARTS.map(b => `<option value="${b}">${b}</option>`).join('');
  const getDistinctOptions = (name) => {
    const cur = bpMap[name] || all.find(e => e.name === name)?.category || 'อื่นๆ';
    return BODY_PARTS.map(b => `<option value="${b}" ${b === cur ? 'selected' : ''}>${b}</option>`).join('');
  };

  if (!filtered.length) {
    document.getElementById('ex-list').innerHTML = `<div style="padding:20px;text-align:center;color:var(--ts);font-size:13px">ไม่พบท่า</div>`;
    return;
  }
  document.getElementById('ex-list').innerHTML = filtered.map(e => {
    const isCustom = customSet.has(e.name);
    const bp       = bpMap[e.name] || e.category || 'อื่นๆ';
    return `<div class="ex-mgmt-item">
      <div class="ex-mgmt-name">${esc(e.name)}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <select class="bp-sel" onchange="updateExBP('${esc(e.name).replace(/'/g, "\\'")}', this.value)">
          ${getDistinctOptions(e.name)}
        </select>
        ${isCustom ? `<button class="icon-btn del" onclick="deleteEx('${esc(e.name).replace(/'/g, "\\'")}')">✕</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Helpers ───────────────────────────────
function todayStr() { return new Date().toISOString().slice(0, 10); }
function metaStr(w) {
  const p = [];
  if (w.sets && w.reps)   p.push(`${w.sets}×${w.reps}`);
  if (Number(w.weight))   p.push(`${w.weight} kg`);
  if (Number(w.duration)) p.push(`${w.duration} นาที`);
  return p.join(' · ') || '—';
}
function relDate(d) {
  const diff = Math.floor((Date.now() - new Date(d + 'T00:00:00')) / 864e5);
  if (diff === 0) return 'วันนี้';
  if (diff === 1) return 'เมื่อวาน';
  return `${diff} วันก่อน`;
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  const days   = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${days[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear() + 543}`;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
